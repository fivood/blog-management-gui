    <p class="pp-eyebrow">Protected Post</p>
    <h2>这篇文章已加密</h2>
    <p class="pp-desc">请输入本篇文章独立密码后解锁正文。</p>

    <form id="protected-form" autocomplete="off">
      <label class="pp-label" for="protected-password">文章密码</label>
      <div class="pp-field">
        <input id="protected-password" type="password" placeholder="密码是文章标题拼音首字母小写" />
        <button id="protected-toggle" type="button">显示</button>
      </div>
      <button id="protected-unlock" type="submit">解锁文章</button>
      <span id="protected-status" hidden>正在解锁...</span>
    </form>

    <p id="protected-error" hidden>密码错误，请重试。</p>
  </section>

  <section id="protected-content" hidden></section>

  <script>
    (() => {
      const container = document.getElementById('protected-post');
      if (!container || !window.crypto || !window.crypto.subtle) return;

      const decoder = new TextDecoder();
      const encoder = new TextEncoder();
      const passwordInput = document.getElementById('protected-password');
      const toggleButton = document.getElementById('protected-toggle');
      const form = document.getElementById('protected-form');
      const unlockButton = document.getElementById('protected-unlock');
      const statusMessage = document.getElementById('protected-status');
      const errorMessage = document.getElementById('protected-error');
      const content = document.getElementById('protected-content');

      toggleButton.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleButton.textContent = isPassword ? '隐藏' : '显示';
      });

      const b64ToBytes = (value) => {
        const bin = atob(value);
        const bytes = new Uint8Array(bin.length);
        for (let index = 0; index < bin.length; index += 1) {
          bytes[index] = bin.charCodeAt(index);
        }
        return bytes;
      };

      const decrypt = async (password, payload) => {
        const baseKey = await window.crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);

        const derivedKey = await window.crypto.subtle.deriveKey(
          {
            name: 'PBKDF2',
            hash: 'SHA-256',
            salt: b64ToBytes(payload.salt),
            iterations: payload.iterations,
          },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );

        const encryptedBytes = b64ToBytes(payload.data);
        const tagBytes = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encryptedBytes.length + tagBytes.length);
        combined.set(encryptedBytes, 0);
        combined.set(tagBytes, encryptedBytes.length);

        const plainBuffer = await window.crypto.subtle.decrypt(
          {
            name: 'AES-GCM',
            iv: b64ToBytes(payload.iv),
            tagLength: 128,
          },
          derivedKey,
          combined
        );

        return decoder.decode(plainBuffer);
      };

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const password = passwordInput.value.trim();
        if (!password) {
          passwordInput.focus();
          return;
        }

        errorMessage.hidden = true;
        unlockButton.disabled = true;
        statusMessage.hidden = false;

        try {
          const payload = JSON.parse(atob(container.dataset.payload || ''));
          const html = await decrypt(password, payload);
          content.innerHTML = html;
          content.hidden = false;
          container.hidden = true;
        } catch {
          errorMessage.hidden = false;
          passwordInput.select();
        } finally {
          unlockButton.disabled = false;
          statusMessage.hidden = true;
        }
      });
    })();
  </script><footer class="mt-12"><div class="mb-3 flex flex-wrap items-center gap-1.5">
