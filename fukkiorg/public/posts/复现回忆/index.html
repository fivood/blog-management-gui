　　“暴雨”的问题解决后，世界终于能正常生产二十一世纪的年历。千禧年后又过了二十个春秋，她们两人回到了布达佩斯定居。作为塞梅尔维斯被基金会招募的起始地，对它多少会带点旧情。
　　最近布达佩斯艺术博物馆正在举办蒂娜·布劳的作品专题回顾。瓦伦缇娜拖着趁休假期赖床的塞梅尔维斯赶在闭馆前来到了博物馆。
　　展厅入口的海报上写着醒目的标题：“隐没街角：蒂娜·布劳与19世纪城市幽影”。
　　从表面看瓦伦缇娜只是挽着塞梅尔维斯的胳膊，但保持微笑的同时她还要暗暗使力拉住这个一心想挣脱的恋人。
　　“你以前都是自己来看展的。”塞梅尔维斯低声抗议，“你的特殊贵宾卡，你那圈内人都熟知的脸，馆里的聚光灯都恨不得全打到你身上。忘了上次我们看克利姆特的展吗，我说那作画方式就是炫富，后面那几个阔太太一起‘嘶——’出了声。”
　　“那些人的高谈阔论听得让人耳朵起茧，我更喜欢你的独到见解。今天这个画家的风格好懂得多，你一看就知道。”仿佛瓦伦缇娜的世界观里只有塞梅尔维斯的眼光才值得被重视，她伸出手摸了摸她的脸，拇指沿着脸颊向上轻推她嘴角，“虽然你生气也很可爱，但这样的表情能不能只放在家里？来，笑一个。”
　　她们在一起都跨越了一整个世纪，塞梅尔维斯还是会败于瓦伦缇娜的油嘴滑舌。她撇了撇嘴，憋出一个快速归位的假笑。
　　“这笑容好没诚意，我受伤了，塞梅尔维斯。”
　　“你小点声吧。”塞梅尔维斯左右看了看，压低声音提醒。
　　没人注意她们，这个展厅的工作人员似乎都默认这位知名人士可以享有某些特权。不少看展游客陆陆续续离开，塞梅尔维斯甚至怀疑如果她们真聊至深夜，馆方能为了瓦伦缇娜推迟闭馆时间。
　　瓦伦缇娜停下脚步，站在一幅画前，语气轻轻低下来：“我在她的工作室喝过茶，短暂地聊了一会儿。”
　　塞梅尔维斯知道她指的是眼前画作的作者，活跃于奥匈帝国时期的风景画家。
　　“风景画的人往往不是主体，”瓦伦缇娜望着画上的那条遍布暖阳的鹅卵石小巷，“但这些连五官都没有的人物色块，不是更能让人更能自由想象么——‘说不定哪幅画里还有你的身影呢’，她曾这么对我说。”
　　她微微一笑，眼睛里似乎注视着遥远的过去。
　　塞梅尔维斯没说话。她和她并肩站着，看着画上的细节，阳光在低矮的小屋左侧投下了与屋高等长的影子，道路尽头隐没在拐角，那种涂抹感的朦胧线条却意外勾起她记忆深处的熟悉。
　　“等等，我认得这个地方。”塞梅尔维斯手撑着下巴，突然说道，“这画——《维也纳的死胡同》，没错了。”
　　“嗯？”
　　“我记得这个围栏。‘暴雨’开始前，我去找你酒馆的路上在这边绕了快十分钟，误入了好几条死路，耽误了不少时间。”
　　“你是说刚进屋就想杀了我那次？”瓦伦缇娜侧过头看向塞梅尔维斯，她们的初次面对面交流的气氛并不温和。
　　“你还好意思说，是谁先下手的？”
　　瓦伦缇娜笑了，拉过塞梅尔维斯，鼻子凑到她脖间嗅了嗅说，“那时的你浑身都散发着‘请立即饮用’的气味，我正巧还没吃饭。”
　　“你还真把这说得像是我该负责的事。”
　　“你确实该负责。私闯民宅，毁坏我的家具，翻阅我的隐私，作为屋主自我防卫的行为不算过分吧。”
　　塞梅尔维斯侧身躲开，再慢一步只怕瓦伦缇娜的牙都要随着记忆重新刺入自己脖颈了。
　　“好好看画！别动手动脚的。”她匆匆丢下一句，大步走开，远离这个不分场合只要兴致到了就要对她做些奇怪举动的血食怪。
　　瓦伦缇娜站在原地，看着她被下一幅画吸引，笑意又浮上了嘴角。她没追上去，目光回到了那幅勾起回忆的画。画上这条小巷走下去确实是条死路，但有个近道能向左绕至河边港口，她的酒馆就在那港口上游的一段，特地选在远离闹市的安静一隅。
　　记忆是个奇妙的东西，随着时间拉长，它会变得模糊，但也会根据主人的偏好自动开启滤镜：塞梅尔维斯第一次杀气腾腾冲过来的场景她在脑中无数次回放，但经过一次次重播后，那个身影却越来越温柔。她的杀意被她美化成了爱意，她的警惕像因羞涩而说不出口的暗恋。
　　“唉。”瓦伦缇娜轻叹，当时塞梅尔维斯要不是自制力足够强大，没有失去理智攻击她，她即便只是稍稍教育这个年轻的感染者，可能也会让对方更恨自己。
　　“那我们可能就不会像现在这样了。”
　　这句话当然没人能听见，除了不远处那个听力和她同样敏锐的，她的爱人。塞梅尔维斯虽然不知道她说这半句话是哪来的灵感，还是斜眼瞪了她一下。
　　瓦伦缇娜笑着向她打招呼，像在说“好巧啊，你也在”，随后便看向旁边一幅秋景中的街道。笔直的树木沿道路排列，枝叶斑驳，夕阳洒落，红砖房安静地坐落在右侧，左边是一条人工水道，树木的阴影在波光粼粼的水面上交织。
　　“塞梅尔维斯，你看，这像不像我们家附近？”
　　听到招呼，塞梅尔维斯又回到她身边。
　　“弗里斯兰运河，1908年。”她念着下方说明标签上的文字。
　　虽然画的并不是她们居住的这个城市，但确实很像她们现在每日回家的必经之路。感谢历史建筑保护条例，一百多年前的风景画里还能看见她们现代生活的倒影。布达佩斯老城区的房子大多是19世纪中叶甚至建成于更早时期，至今仍能作为住所或者咖啡馆画廊之类使用。
　　她们又在一些画中的建筑和街道里找到了熟悉的场景，还就某栋房子屋顶当年是什么颜色的开展了激烈辩论，她们对视片刻，谁也没说服对方，但手指不经意间靠近，然后握紧。
　　二人牵着手穿过逐渐清空的展厅，走出馆门，街灯已经亮起。那条与画中惊人相似的街道就在离家不远的地方，等着她们回去。
　　瓦伦缇娜故意放慢步伐，比对着道路和画中的异同，塞梅尔维斯却一直拽着她的手快走。
　　回到她们经过内部翻新的老宅，门一关，灯也不开，塞梅尔维斯把自己和瓦伦缇娜的外套刚挂上衣帽架，就牵着她来到客厅的沙发。
　　瓦伦缇娜没有惊讶，轻轻躺下，双手迎向瞳孔火红到发光的恋人。
　　塞梅尔维斯一句话也没说，拨开瓦伦缇娜一侧长发，直接咬向她洁白的颈部。她似乎在释放自己一百多年前在酒馆中成功克制的欲望。她的牙精准刺入最佳吸血位，血液汩汩涌入喉咙，她渴得像在监牢里关了三天禁闭滴水未进。
　　瓦伦缇娜躺在她身下，抚摸着她的发丝，像在哄一只在本能下行动的野兽，这些年她们不是没有互相摄取过血液，只是这次塞梅尔维斯的状况很不同。她感受到塞梅尔维斯的情绪如决堤般汹涌，来着来自遥远过去的愤怒、震惊、恐惧，还有比那些加起来更强烈的爱意，狠狠地嵌进自己身体。但这疼痛被她自动转换为甜美的负担。
　　“看到那幅小巷的画，你想起原本是要杀了我的吧。”瓦伦缇娜的声音微弱。
　　咬合没有松开，反而更深了些。
　　“我也庆幸那时你恢复理智了，我们才能好好对话。不然我可能要花更多的时间让你爱上我。”
　　瓦伦缇娜感觉有血液顺着后背流到了沙发上，她应该把深绿色的沙发套换成红色的。
　　塞梅尔维斯终于松了口，她看着自己造成的两个血孔逐渐愈合，但还是有部分血从肩头流下，她用舌头捕捉，直到舔净了视线里的最后一滴血。
　　“塞梅尔维斯你这样我很难忍耐。”瓦伦缇娜扶住了她的腰。
　　“我只是想确认当时的心情。”塞梅尔维斯直起身，坐在瓦伦缇娜身上。她用手背抹掉嘴上的血迹，又把手背也舔干净。
　　“结果是？”现在明明是深秋时节，瓦伦缇娜却有点燥热。
　　塞梅尔维斯注视着对方，笑容里带着还未收起的獠牙：“我想吸你的血，而不是别人的。不管是出自什么原因，这是一种本能的欲望。”
　　“但你那时战胜了本能。”瓦伦缇娜撑起身，为了更靠近她的脸，“现在呢？在遵循本能？因为不需要克制了？”
　　塞梅尔维斯没有回答，吻住了她，不想让她再提问了，她们的口腔里满是血锈与甜蜜。
　　瓦伦缇娜不是什么禁欲的苦修者，早在坐起时就在解塞梅尔维斯胸前衣扣，一边接吻，对方也一边配合地将一件件衣物脱下，仅剩下内衣裤。
　　“冷么？要不要到床上去？”瓦伦缇娜沿着塞梅尔维斯的背脊向下抚摸，发现这是个傻问题，她的体温就像烈日下的广场石砖在灼烧自己。她手指在塞梅尔维斯身后轻轻一勾，内衣就被她甩到了旁边的茶几上。她手掌覆上那两团洁白柔软，把塞梅尔维斯推倒至另一侧扶手。她的牙咬破了她的下唇，似乎要把刚才损失的血全夺取回来，吸吮着嘴唇和舌尖，她也热得脱掉了上衣。
　　瓦伦缇娜搓揉着掌心中逐渐变硬的两点，听着塞梅尔维斯忍耐不住发出的呻吟，她愈发兴奋，手上的力度增加。
　　“嗯……”塞梅尔维斯觉得有点疼，刚要用膝盖顶开瓦伦缇娜提醒，就被她分开了腿，几乎要抬到沙发靠背上。
　　“就这么想我的手换个地方？”瓦伦缇娜抱着塞梅尔维斯的腰，让她稍微侧身贴着沙发，舔了舔自己的手指，拨开内裤布料，毫无预警地一推到底。
　　“你……！瓦伦缇娜！啊……！”塞梅尔维斯叫出了声，她挥拳打到瓦伦缇娜肩上。
　　瓦伦缇娜单手握住她手腕，再利落地扣住另一只，只有这个时候塞梅尔维斯才会意识到她们力量依旧悬殊。像是报复似的，瓦伦缇娜还没等她湿润，两根手指就开始进出。
　　“我也想确认当时的心情，”她把塞梅尔维斯双手拉到扶手处按住，“该给你点小教训了。”
　　说罢瓦伦缇娜附身向前，鬓发擦过塞梅尔维斯的脸颊，咬向了她的脖子，另一只手持续在她身体里推送。两处刺激和疼痛让塞梅尔维斯只能蹬腿反击，可她越是挣扎，腿就被分得越开，瓦伦缇娜也进得越深。
　　“啊！……瓦……哈……你这……”塞梅尔维斯已经说不出完整的句子，她闭着眼大口喘气，腰不由自主地扭动，这具身体熟知瓦伦缇娜的气味与节奏，很快她就听见了自己无法控制的水声。她的腿攀向瓦伦缇娜的背，默默接受着进攻。
　　瓦伦缇娜发觉身下的爱人不再抵抗，原本专注的目光看见了顺着耳边悄然流下的泪痕。她心里一紧，放开了束缚她双手的左手，急切地舔向她眼角。
　　“我亲爱的宝贝……”瓦伦缇娜的声音像跌进了湖水般颤抖和不安，她抚摸着恋人的脸，“我有些激动，原谅我，好吗？”
　　她轻轻吻上微张着仍在喘息的嘴唇，没有了挑衅，没有了惩罚，这只一个小小的请求。
　　塞梅尔维斯摇了摇头，那双泛着红印的手腕绕过她的脖子，搂住了这个她本应恨之入骨的永生吸血鬼。那些憎恨早在某个不知名的瞬间溶解成了另一种更复杂而深刻的情绪。
　　“我只是……”她喘了口气，呼吸间还带着刚才血液的气息。

塞梅尔维斯没说话。她和她并肩站着，看着画上的细节，阳光在低矮的小屋左侧投下了与屋高等长的影子，道路尽头隐没在拐角，那种涂抹感的朦胧线条却意外勾起她记忆深处的熟悉。
“等等，我认得这个地方。”塞梅尔维斯手撑着下巴，突然说道，“这画——《维也纳的死胡同》，没错了。”
“嗯？”
“我记得这个围栏。‘暴雨’开始前，我去找你酒馆的路上在这边绕了快十分钟，误入了好几条死路，耽误了不少时间。”
“你是说刚进屋就想杀了我那次？”瓦伦缇娜侧过头看向塞梅尔维斯，她们的初次面对面交流的气氛并不温和。
“你还好意思说，是谁先下手的？”
瓦伦缇娜笑了，拉过塞梅尔维斯，鼻子凑到她脖间嗅了嗅说，“那时的你浑身都散发着‘请立即饮用’的气味，我正巧还没吃饭。”
“你还真把这说得像是我该负责的事。”
“你确实该负责。私闯民宅，毁坏我的家具，翻阅我的隐私，作为屋主自我防卫的行为不算过分吧。”
塞梅尔维斯侧身躲开，再慢一步只怕瓦伦缇娜的牙都要随着记忆重新刺入自己脖颈了。
“好好看画！别动手动脚的。”她匆匆丢下一句，大步走开，远离这个不分场合只要兴致到了就要对她做些奇怪举动的血食怪。
瓦伦缇娜站在原地，看着她被下一幅画吸引，笑意又浮上了嘴角。她没追上去，目光回到了那幅勾起回忆的画。画上这条小巷走下去确实是条死路，但有个近道能向左绕至河边港口，她的酒馆就在那港口上游的一段，特地选在远离闹市的安静一隅。
记忆是个奇妙的东西，随着时间拉长，它会变得模糊，但也会根据主人的偏好自动开启滤镜：塞梅尔维斯第一次杀气腾腾冲过来的场景她在脑中无数次回放，但经过一次次重播后，那个身影却越来越温柔。她的杀意被她美化成了爱意，她的警惕像因羞涩而说不出口的暗恋。
“唉。”瓦伦缇娜轻叹，当时塞梅尔维斯要不是自制力足够强大，没有失去理智攻击她，她即便只是稍稍教育这个年轻的感染者，可能也会让对方更恨自己。
“那我们可能就不会像现在这样了。”
这句话当然没人能听见，除了不远处那个听力和她同样敏锐的，她的爱人。塞梅尔维斯虽然不知道她说这半句话是哪来的灵感，还是斜眼瞪了她一下。
瓦伦缇娜笑着向她打招呼，像在说“好巧啊，你也在”，随后便看向旁边一幅秋景中的街道。笔直的树木沿道路排列，枝叶斑驳，夕阳洒落，红砖房安静地坐落在右侧，左边是一条人工水道，树木的阴影在波光粼粼的水面上交织。
“塞梅尔维斯，你看，这像不像我们家附近？”
听到招呼，塞梅尔维斯又回到她身边。
“弗里斯兰运河，1908年。”她念着下方说明标签上的文字。
虽然画的并不是她们居住的这个城市，但确实很像她们现在每日回家的必经之路。感谢历史建筑保护条例，一百多年前的风景画里还能看见她们现代生活的倒影。布达佩斯老城区的房子大多是19世纪中叶甚至建成于更早时期，至今仍能作为住所或者咖啡馆画廊之类使用。
她们又在一些画中的建筑和街道里找到了熟悉的场景，还就某栋房子屋顶当年是什么颜色的开展了激烈辩论，她们对视片刻，谁也没说服对方，但手指不经意间靠近，然后握紧。
二人牵着手穿过逐渐清空的展厅，走出馆门，街灯已经亮起。那条与画中惊人相似的街道就在离家不远的地方，等着她们回去。
瓦伦缇娜故意放慢步伐，比对着道路和画中的异同，塞梅尔维斯却一直拽着她的手快走。
回到她们经过内部翻新的老宅，门一关，灯也不开，塞梅尔维斯把自己和瓦伦缇娜的外套刚挂上衣帽架，就牵着她来到客厅的沙发。
瓦伦缇娜没有惊讶，轻轻躺下，双手迎向瞳孔火红到发光的恋人。
塞梅尔维斯一句话也没说，拨开瓦伦缇娜一侧长发，直接咬向她洁白的颈部。她似乎在释放自己一百多年前在酒馆中成功克制的欲望。她的牙精准刺入最佳吸血位，血液汩汩涌入喉咙，她渴得像在监牢里关了三天禁闭滴水未进。
瓦伦缇娜躺在她身下，抚摸着她的发丝，像在哄一只在本能下行动的野兽，这些年她们不是没有互相摄取过血液，只是这次塞梅尔维斯的状况很不同。她感受到塞梅尔维斯的情绪如决堤般汹涌，来着来自遥远过去的愤怒、震惊、恐惧，还有比那些加起来更强烈的爱意，狠狠地嵌进自己身体。但这疼痛被她自动转换为甜美的负担。
“看到那幅小巷的画，你想起原本是要杀了我的吧。”瓦伦缇娜的声音微弱。
咬合没有松开，反而更深了些。
“我也庆幸那时你恢复理智了，我们才能好好对话。不然我可能要花更多的时间让你爱上我。”
瓦伦缇娜感觉有血液顺着后背流到了沙发上，她应该把深绿色的沙发套换成红色的。

“结果是？”现在明明是深秋时节，瓦伦缇娜却有点燥热。
塞梅尔维斯注视着对方，笑容里带着还未收起的獠牙：“我想吸你的血，而不是别人的。不管是出自什么原因，这是一种本能的欲望。”
“但你那时战胜了本能。”瓦伦缇娜撑起身，为了更靠近她的脸，“现在呢？在遵循本能？因为不需要克制了？”
塞梅尔维斯没有回答，吻住了她，不想让她再提问了，她们的口腔里满是血锈与甜蜜。
瓦伦缇娜不是什么禁欲的苦修者，早在坐起时就在解塞梅尔维斯胸前衣扣，一边接吻，对方也一边配合地将一件件衣物脱下，仅剩下内衣裤。
“冷么？要不要到床上去？”瓦伦缇娜沿着塞梅尔维斯的背脊向下抚摸，发现这是个傻问题，她的体温就像烈日下的广场石砖在灼烧自己。她手指在塞梅尔维斯身后轻轻一勾，内衣就被她甩到了旁边的茶几上。她手掌覆上那两团洁白柔软，把塞梅尔维斯推倒至另一侧扶手。她的牙咬破了她的下唇，似乎要把刚才损失的血全夺取回来，吸吮着嘴唇和舌尖，她也热得脱掉了上衣。
瓦伦缇娜搓揉着掌心中逐渐变硬的两点，听着塞梅尔维斯忍耐不住发出的呻吟，她愈发兴奋，手上的力度增加。
“嗯……”塞梅尔维斯觉得有点疼，刚要用膝盖顶开瓦伦缇娜提醒，就被她分开了腿，几乎要抬到沙发靠背上。
“就这么想我的手换个地方？”瓦伦缇娜抱着塞梅尔维斯的腰，让她稍微侧身贴着沙发，舔了舔自己的手指，拨开内裤布料，毫无预警地一推到底。
“你……！瓦伦缇娜！啊……！”塞梅尔维斯叫出了声，她挥拳打到瓦伦缇娜肩上。
瓦伦缇娜单手握住她手腕，再利落地扣住另一只，只有这个时候塞梅尔维斯才会意识到她们力量依旧悬殊。像是报复似的，瓦伦缇娜还没等她湿润，两根手指就开始进出。
“我也想确认当时的心情，”她把塞梅尔维斯双手拉到扶手处按住，“该给你点小教训了。”
说罢瓦伦缇娜附身向前，鬓发擦过塞梅尔维斯的脸颊，咬向了她的脖子，另一只手持续在她身体里推送。两处刺激和疼痛让塞梅尔维斯只能蹬腿反击，可她越是挣扎，腿就被分得越开，瓦伦缇娜也进得越深。
“啊！……瓦……哈……你这……”塞梅尔维斯已经说不出完整的句子，她闭着眼大口喘气，腰不由自主地扭动，这具身体熟知瓦伦缇娜的气味与节奏，很快她就听见了自己无法控制的水声。她的腿攀向瓦伦缇娜的背，默默接受着进攻。
瓦伦缇娜发觉身下的爱人不再抵抗，原本专注的目光看见了顺着耳边悄然流下的泪痕。她心里一紧，放开了束缚她双手的左手，急切地舔向她眼角。
“我亲爱的宝贝……”瓦伦缇娜的声音像跌进了湖水般颤抖和不安，她抚摸着恋人的脸，“我有些激动，原谅我，好吗？”
她轻轻吻上微张着仍在喘息的嘴唇，没有了挑衅，没有了惩罚，这只一个小小的请求。
塞梅尔维斯摇了摇头，那双泛着红印的手腕绕过她的脖子，搂住了这个她本应恨之入骨的永生吸血鬼。那些憎恨早在某个不知名的瞬间溶解成了另一种更复杂而深刻的情绪。
“我只是……”她喘了口气，呼吸间还带着刚才血液的气息。

“冷么？要不要到床上去？”瓦伦缇娜沿着塞梅尔维斯的背脊向下抚摸，发现这是个傻问题，她的体温就像烈日下的广场石砖在灼烧自己。她手指在塞梅尔维斯身后轻轻一勾，内衣就被她甩到了旁边的茶几上。她手掌覆上那两团洁白柔软，把塞梅尔维斯推倒至另一侧扶手。她的牙咬破了她的下唇，似乎要把刚才损失的血全夺取回来，吸吮着嘴唇和舌尖，她也热得脱掉了上衣。
瓦伦缇娜搓揉着掌心中逐渐变硬的两点，听着塞梅尔维斯忍耐不住发出的呻吟，她愈发兴奋，手上的力度增加。
“嗯……”塞梅尔维斯觉得有点疼，刚要用膝盖顶开瓦伦缇娜提醒，就被她分开了腿，几乎要抬到沙发靠背上。
“就这么想我的手换个地方？”瓦伦缇娜抱着塞梅尔维斯的腰，让她稍微侧身贴着沙发，舔了舔自己的手指，拨开内裤布料，毫无预警地一推到底。
“你……！瓦伦缇娜！啊……！”塞梅尔维斯叫出了声，她挥拳打到瓦伦缇娜肩上。
瓦伦缇娜单手握住她手腕，再利落地扣住另一只，只有这个时候塞梅尔维斯才会意识到她们力量依旧悬殊。像是报复似的，瓦伦缇娜还没等她湿润，两根手指就开始进出。
“我也想确认当时的心情，”她把塞梅尔维斯双手拉到扶手处按住，“该给你点小教训了。”
说罢瓦伦缇娜附身向前，鬓发擦过塞梅尔维斯的脸颊，咬向了她的脖子，另一只手持续在她身体里推送。两处刺激和疼痛让塞梅尔维斯只能蹬腿反击，可她越是挣扎，腿就被分得越开，瓦伦缇娜也进得越深。
“啊！……瓦……哈……你这……”塞梅尔维斯已经说不出完整的句子，她闭着眼大口喘气，腰不由自主地扭动，这具身体熟知瓦伦缇娜的气味与节奏，很快她就听见了自己无法控制的水声。她的腿攀向瓦伦缇娜的背，默默接受着进攻。
瓦伦缇娜发觉身下的爱人不再抵抗，原本专注的目光看见了顺着耳边悄然流下的泪痕。她心里一紧，放开了束缚她双手的左手，急切地舔向她眼角。
“我亲爱的宝贝……”瓦伦缇娜的声音像跌进了湖水般颤抖和不安，她抚摸着恋人的脸，“我有些激动，原谅我，好吗？”
她轻轻吻上微张着仍在喘息的嘴唇，没有了挑衅，没有了惩罚，这只一个小小的请求。
塞梅尔维斯摇了摇头，那双泛着红印的手腕绕过她的脖子，搂住了这个她本应恨之入骨的永生吸血鬼。那些憎恨早在某个不知名的瞬间溶解成了另一种更复杂而深刻的情绪。
“我只是……”她喘了口气，呼吸间还带着刚才血液的气息。
