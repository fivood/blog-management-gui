“亲爱的你真是……”瓦伦缇娜看着内裤的水痕连连感叹，已经压不住嘴角的弧度。
“你别说话……”塞梅尔维斯把脸埋进枕头里，像个不想面对事实的鸵鸟。
瓦伦缇娜跪坐在她大腿上方，手指顺着脊线抚摸至股间，那里的炽热是一声呼唤，她的指腹沾上热流的出口，塞梅尔维斯明显颤抖了一下。
“啊……！”手指进入的一刻，塞梅尔维斯即将飘散的意识被因为一直得不到满足而扩大的感官召回，每根神经都被唤醒了。她蜷起脚趾，面对即将被瓦伦缇娜精准拆解的命运。
瓦伦缇娜再伸进一指，双指被滑腻的液体裹满，她的呼吸也逐渐紊乱。
她手腕用力，推至深处，再缓慢抽出一半，再要推进时被夹紧的阻力拦下。
“哈……你里面好热……放松些、放松。”瓦伦缇娜一手扶着塞梅尔维斯的腰，再次尝试推入。
“嗯……”塞梅尔维斯想弓起身子，手腕的束缚和大腿上的重量让她难以如愿，“你压着，我放松不了……”
瓦伦缇娜从她身上下来，托起了她的腰，还在她身体里的手指开始缓缓地进出。
“现在呢？”她加重了力道。
“啊、啊……不行、瓦伦缇娜、我……”
“什么不行？哪里不行？”瓦伦缇娜笑着问，同时动作没有停。
“你……！哈、嗯……”
随着一次次推进到底，塞梅尔维斯的每寸肌肤都在扩大失守的边界。
“给、快给我、解开……”她的手不知如何放才好，持续涌来的快感让她的浑身细胞都想呐喊释放，她渴望恋人来自正面的拥抱和亲吻。
瓦伦缇娜再次将塞梅尔维斯身子扳至仰躺的姿势，她轻轻一扯布的一端，神秘术就像从未存在，布轻飘落下。塞梅尔维斯的手腕一得到解放便迅速勾起瓦伦缇娜的脖子，牙齿在她的肩头狠狠咬了一口。
“不听话的孩子。”瓦伦缇娜并不在意肩上的疼痛，微微一笑，加快了进出的速度。
“唔……？！”牙尖的深深嵌入也堵住了自己的呻吟，塞梅尔维斯几乎整个人挂在瓦伦缇娜身上，血液流进口中带来了更强烈的渴求，逐渐高涨的欲望即将随着一次次冲击达到顶峰。
瓦伦缇娜搂紧她的腰，最后一次推入，手指根部完全没进了恋人的体内，那阵抽搐的收缩也将它们困在了里面，仿佛不愿指尖离去。
“呜……”塞梅尔维斯松开口。
“我爱你。”
不是低声的耳语，也不是平日玩笑的随口一句，一字一顿的词击中了塞梅尔维斯内心最柔软的深处。
瓦伦缇娜轻轻吻向吞咽后的塞梅尔维斯，她的唇边还带着自己肩上的血。她没有着急离开这具瘫软的身体，再次将她抱紧，唇贴在她耳侧，一遍又一遍重复着那句话，像一句咒语，烙进了塞梅尔维斯的血脉。
塞梅尔维斯睁开眼，眼里泛着潮湿的光。
