<!doctype html><html class="not-ready lg:text-base" style=--bg:#faf8f1 lang=en-us dir=ltr><head><meta charset=utf-8><meta http-equiv=X-UA-Compatible content="IE=edge"><meta name=viewport content="width=device-width,initial-scale=1,shrink-to-fit=no"><title>同轨 - 有空写点-测试版</title><meta name=theme-color><meta name=description content="布达佩斯市中心，多瑙河的右岸，一条宁静而不失风情的老街沿岸伸展。街道两侧是排列紧凑的19世纪楼房，有些甚至甚至可追溯至布达与佩斯合并前的年代。一层店面多为古董店或艺术画廊，橱窗里陈列着各式古旧玩物与画作，街道因而也被称为“古董街”。白天，游客们驻足窗前讨论真伪，画廊老板相互打听对方寻得的藏品；夜晚店铺打烊，街道变得安静幽深，而此时在一幢刚好被行道树树冠触及的老建筑三层，一扇不起眼的拱形窗户才会亮起灯光。
　　那扇窗被厚重的窗帘遮蔽，唯有夜色知晓房间的主人从不与白昼相见。
　　瓦伦缇娜和塞梅尔维斯就住在一间画廊的楼上，这间画廊自然也是年长血食怪的一项投资。
　　夏季的楤树枝叶茂密，被街灯投下斑驳的树影，轻轻摇晃着，映在了刚好掀开窗帘的女主人脸上。瓦伦缇娜靠着窗台，歪头看向蓝色逐渐褪去的夜空，城市的灯光使得狭窄的天幕间只有零星的亮点。
　　“塞梅尔维斯，今晚跟我去个地方？”她回头对还在床上蒙头不肯起的恋人提议道。
　　被子动了动，里面的人没有更多回应。
　　瓦伦缇娜走回床边半倚着床头，一手拨开塞梅尔维斯的长发，亲了亲她的额角。
　　“有间新开的餐馆，据说甜点是他们的招牌。”她说着，手指在塞梅尔维斯裸露的肩上画圈，“我订了今晚的位置。你要再不起来，我就……”
　　话音未落，她的手被塞梅尔维斯一把攥住，拉进了轻薄的夏被里，按在了自己依旧缓慢跳动的心脏之上。
　　“我还不饿。”她的声音慵懒，脸在瓦伦缇娜的手臂上蹭了蹭，“让我再睡半小时。”
　　瓦伦缇娜看了眼墙上的古典挂钟，时针已经指向了八的数字。她笑了，这样撒娇的塞梅尔维斯不多见，通常只存在于第二天没有基金会委派的任务，而她又确实疲惫过度时才会像这样抱着自己不撒手。瓦伦缇娜在被子里的手向下挪了挪，托住那团温热柔软的重量。
　　“好吧，就半小时。”瓦伦缇娜轻声妥协，手掌出乎意料地只是一动不动放在上面。
　　当然，这只不过是倒计时响起前的平静时光罢了。
　　塞梅尔维斯的鼻息很快趋于平缓，瓦伦缇娜坐在床沿，打开了手机，调低了亮度，在导航应用上输入了一个准备已久的地点。那家餐馆的甜点或许美味，却并不是今晚的重头戏。她又看了眼邮箱，未读信件里提到几件拍品的交接时间还没确认，助手留言说新送到的一幅画画框有些破损，询问修复事宜，她边回复邮件边瞥了一眼塞梅尔维斯，熟睡的样子让人不忍心打扰。
　　手机里的时间一分分走过，三十分钟比想象中更快。
　　瓦伦缇娜稍稍活动了那只被压住而有点发麻的手，依旧被塞梅尔维斯抱得很紧。
　　“宝贝。”她低声呼唤了一句，恋人纹丝未动，她叹了口气，无论如何也要行使闹钟的职责了。
　　她的手掌微微下沉，像按下某个无形的开关，屈起手指在某个特定敏感处拨挠着。
　　“嗯……”塞梅尔维斯眉头一皱，睫毛颤了颤，从梦境和清醒的夹缝中挣扎出一声低吟。
　　“该起床了亲爱的，时间不等人。”瓦伦缇娜低头俯视她，发梢垂到了她脸上，手指的力度加重了几分。
　　“……哼。”塞梅尔维斯的手从被子里摸索出来圈住了她的腰，喃喃说道，“希望这家店的东西真有那么好吃，值得我牺牲睡眠。”
　　半小时后，她们换好了衣服。瓦伦缇娜从鞋柜抽屉取出一张野餐垫装进了包里。
　　“你带它干什么？我们要在人家餐厅大堂里坐下野餐么？”塞梅尔维斯露出不解的眼神。
　　“我们要去一个适合享用美食的地方。”瓦伦缇娜以惯有的狡黠笑意掩盖了真正目的地，并且“美食”对她来说可能还有另一层含义。
　　塞梅尔维斯似乎读出了话外音，瞪了她一眼。
　　夏夜渐深，穿着长风衣的二人在微风拂过的街道上甚至感到凉爽。瓦伦缇娜按下车库的遥控，画廊对面的金属卷门升起，如钢琴低音区的机械响声给静谧的古董街带来了夜间的一丝躁动。一辆酒红色流线型的阿尔法·罗密欧 33 Stradale静静地卧在里面，车门向上打开，如伸展出了羽翼。
　　“你就不能开辆普通的车？”塞梅尔维斯坐进副驾，系上安全带，“我都能想到明天社交平台上又有带着这辆车照片的帖子出现了。”
　　虽然这辆2023年复刻的限量复古跑车出现在大众视野的机会不多，但邻近几家店铺老板时常望向车库的位置，他们都知道这是属于一位身份神秘的画廊老板所有。每它在街边短暂停靠，都会引来一群爱车人士和游客驻足围观。
　　“车买了就是用来开的。平时去的地方近，也没多少机会用它。”瓦伦缇娜坐进驾驶位，两边的车门缓缓落下，“真正的好东西若无人欣赏，没人理解它的价值，就只能在仓库里吃灰老去。”
　　“今天会去很远的地方？”塞梅尔维斯捕捉到了她话里的隐藏意思。
　　“我们先取吃的——然后出城。”瓦伦缇娜笑了笑，一脚油门，车辆驶入了夜色里。
　　向北穿行至街口，瓦伦缇娜一记优雅的右转驶向圣·伊什特万大道，车灯扫过一排排亮着的店铺，最终停在一家隐匿在深绿色遮阳蓬后方的西餐馆。这辆车的出现本身就是一种提醒，没过半分钟，一名身着制服的门童从餐馆内快步走出，手里捧着一个包装精美的方形蛋糕盒。
　　车窗放下，他朝二人举了个躬，塞梅尔维斯顺手接过那只盒子。瓦伦缇娜递出一张作为小费的钞票。
　　塞梅尔维斯把蛋糕盒放在座位中间，转头看向瓦伦缇娜：“看来你早就安排好了。”
　　“就在某人呼呼大睡的时候。”她伸手摸了摸塞梅尔维斯的脸，忍不住想亲她，探出的身子却被安全带拦了下来。
　　“啧。”瓦伦缇娜撇了撇嘴，只得坐正。
　　“好好开车！”塞梅尔维斯笑着回握了她的手一下便松开了。
　　双座跑车再次启动，车身驶出布达佩斯最后一段有灯光的街道时，瓦伦缇娜在复杂的中控台上扳动了一个按扭，电子屏从仪表盘下方伸出，她点了播放键，一段熟悉的钢琴前奏响起，如夜风轻抚耳边。
　　“还是这首啊。”塞梅尔维斯轻声说道。
　　“这首不好么？我换一个？”
　　“不，很好，就它吧。”
　　肖邦《夜曲·作品72第一号》，她们第一次亲吻就是在这首曲子的见证下。不管经过多少年，更换了多少城市，只要旋律响起，她们的时间就会重叠在那个时刻。
　　“你那时生疏的样子真可爱，塞梅尔维斯。”瓦伦缇娜专注地看着前方，嘴角勾起。
　　“说得好像你很有经验似的。”乘客发起一记有力的还击。
　　“可我知道用来呼吸的是鼻子而不是嘴。”司机不甘示弱。
　　“你还不是照样憋红了脸。”球再次传了回去。
　　“是谁像个小猫一样又啃又咬？”对方接住了球，替换成逗猫棒。
　　“打住、你肯定记错了，第一次就咬的绝对不是我。”小猫的脸红了，一把拍掉逗猫棒，单方面宣告获胜，表示不再进行回忆游戏。
　　瓦伦缇娜忍住笑，手指在方向盘上轻轻点了几下，像是在赞赏小猫的任性。
　　车窗外的建筑渐渐变得低矮，一望无际的田野里偶尔可见工厂塔楼轮廓。进入M3高速后，城市逐渐在后视镜里消失，平原沉入了暮色里。离开了人工光照明显的区域，深邃的天空也慢慢浮现出更多的星光。
　　越往东走，夜色越浓，平缓的行驶让塞梅尔维斯起了倦意，在钢琴曲的温柔环绕中闭上了眼。
　　沿途经过了几个小镇和加油站，大地已经完全覆盖进暗蓝色的幕帷下，从多尔曼德向南转到33号公路又行驶了一段之后，远方已经几乎没有灯光干扰，天空呈现出它真正的深夜。东南方向一道云雾正在升起，从草原尽头流向空中的光之河诞生于地平线。
　　引擎的声音减弱，塞梅尔维斯感觉到了车速的变化。
　　“瓦伦缇娜……我们快到了？”她微睁开眼。
　　“看那里。”瓦伦缇娜指向右前方。
33号公路其中一段从波洛斯洛小镇穿过，旁边是连通着蒂萨河的大片湖泊，下方还建着一个水库，这里也是观鸟和摄影爱好者的圣地。她们正在跨湖的公路穿行，湖泊犹如打磨后的镜面，上升的银河倒影正投射其中，湖面与天穹的星光点点相连。
　　“我们应该能在11点前进入国家公园。”瓦伦缇娜看了眼仪表盘的时间。
　　塞梅尔维斯掏出手机查看现在的定位，她们在霍尔托巴吉国家公园以西的位置。这个公园在1999年作为文化遗产被列入《世界遗产名录》，在天文爱好者圈子里是知名的适合观星的暗夜公园。现在早就过了接待游客的时段，但她知道瓦伦缇娜一定有自己的路线规划。
　　塞梅尔维斯侧着头靠在椅背上，望向湖面，微风拂过后，星光倒影被打碎成了一粒粒银沙。她想象着和所爱的人静静看着银河从地平线升至天顶，或许是她们作为不能在日间活动的最大补偿。
　　“你是打算开着这辆招摇的跑车从小路闯入么？我都有点心疼这辆车了。”
　　“它当然会受到神秘术保护，没人知道我们从哪进去的。”瓦伦缇娜笑着启动了预先设置的车辆改装系统，车身通体像包裹了一层无法接近的屏障，就算有人目击到这辆车，也会被“忽视它”的咒语影响，真正的当其不存在。
　　过了蒂萨河，又沿公路行驶了二十分钟后，车辆一转绕进一条细瘦的碎石小道，这边夜间没有巡逻人员的踪影，石头和野草在车身附近自动展开，簌簌的草叶声提醒着她们正在驶入草原深处。具有本能危险感知的野生动物也纷纷远离这辆载有两个吸血鬼的座驾。
　　瓦伦缇娜将车稳稳停在野草不高的区域，熄灭车灯。发动机噤声后，世界瞬间安静下来，蛙声和虫鸣开始组成耳边的旋律。她们把外套脱了放在车里，脚踩上柔软的草地，靴子被夜露沾湿。瓦伦缇娜从包里抽出准备好的野餐垫，轻轻一甩，铺在草地上。
　　塞梅尔维斯靠在车边抬头看了看夜空，如水墨画晕染的银河轮廓从东南方抬起，比刚才路过湖面时所见的角度又高了几分，最亮的那段星云正悄然攀升。她弯腰从车里取出蛋糕盒，放在了餐垫上拆开包装。
　　里面是她喜欢的红丝绒蛋糕，夹着厚厚的香草奶油霜，顶上点缀着蓝莓、覆盆子和奶油花。店家还好心的配备了金属雕花的刀叉和花纹餐盘，像是从店里直接拿出来的。
　　她切下一半，装进餐盘里递给已经坐下、正仰头看着星河的恋人。
　　“喂我。”瓦伦缇娜张嘴，指了指自己，她的獠牙还未伸长。
　　塞梅尔维斯蹙眉，用叉子直接切了一小块放在了瓦伦缇娜的舌头上。舌尖轻轻卷起那块蛋糕含进口中，红丝绒与奶油在嘴里融化，瓦伦缇娜发出满意的赞叹。塞梅尔维斯切了另一块自己尝了一口，细腻而有层次的口感让她也不由得睁大了双眼，就在她要吃第二口的时候，瓦伦缇娜凑近，吻上了她的唇。"><meta name=author content="五木"><link rel="preload stylesheet" as=style href=https://fukki.org/main.min.5386ecd394e7be7afd2e16a99946702b0eaae87b08f0f3957aaaa3e6b593a037.css integrity="sha256-U4bs05Tnvnr9LhapmUZwKw6q6HsI8POVeqqj5rWToDc="><link rel=preload as=image href=https://fukki.org/theme.png><script defer src=https://fukki.org/highlight.min.js onload=hljs.initHighlightingOnLoad()></script><link rel=icon href=https://fukki.org/favicon.ico><link rel=apple-touch-icon href=https://fukki.org/apple-touch-icon.png><meta name=generator content="Hugo 0.157.0"><meta itemprop=name content="同轨"><meta itemprop=description content="布达佩斯市中心，多瑙河的右岸，一条宁静而不失风情的老街沿岸伸展。街道两侧是排列紧凑的19世纪楼房，有些甚至甚至可追溯至布达与佩斯合并前的年代。一层店面多为古董店或艺术画廊，橱窗里陈列着各式古旧玩物与画作，街道因而也被称为“古董街”。白天，游客们驻足窗前讨论真伪，画廊老板相互打听对方寻得的藏品；夜晚店铺打烊，街道变得安静幽深，而此时在一幢刚好被行道树树冠触及的老建筑三层，一扇不起眼的拱形窗户才会亮起灯光。

她的手掌微微下沉，像按下某个无形的开关，屈起手指在某个特定敏感处拨挠着。
“嗯……”塞梅尔维斯眉头一皱，睫毛颤了颤，从梦境和清醒的夹缝中挣扎出一声低吟。
“该起床了亲爱的，时间不等人。”瓦伦缇娜低头俯视她，发梢垂到了她脸上，手指的力度加重了几分。
“……哼。”塞梅尔维斯的手从被子里摸索出来圈住了她的腰，喃喃说道，“希望这家店的东西真有那么好吃，值得我牺牲睡眠。”
半小时后，她们换好了衣服。瓦伦缇娜从鞋柜抽屉取出一张野餐垫装进了包里。
“你带它干什么？我们要在人家餐厅大堂里坐下野餐么？”塞梅尔维斯露出不解的眼神。
“我们要去一个适合享用美食的地方。”瓦伦缇娜以惯有的狡黠笑意掩盖了真正目的地，并且“美食”对她来说可能还有另一层含义。
塞梅尔维斯似乎读出了话外音，瞪了她一眼。
夏夜渐深，穿着长风衣的二人在微风拂过的街道上甚至感到凉爽。瓦伦缇娜按下车库的遥控，画廊对面的金属卷门升起，如钢琴低音区的机械响声给静谧的古董街带来了夜间的一丝躁动。一辆酒红色流线型的阿尔法·罗密欧 33 Stradale静静地卧在里面，车门向上打开，如伸展出了羽翼。
“你就不能开辆普通的车？”塞梅尔维斯坐进副驾，系上安全带，“我都能想到明天社交平台上又有带着这辆车照片的帖子出现了。”
虽然这辆2023年复刻的限量复古跑车出现在大众视野的机会不多，但邻近几家店铺老板时常望向车库的位置，他们都知道这是属于一位身份神秘的画廊老板所有。每它在街边短暂停靠，都会引来一群爱车人士和游客驻足围观。
“车买了就是用来开的。平时去的地方近，也没多少机会用它。”瓦伦缇娜坐进驾驶位，两边的车门缓缓落下，“真正的好东西若无人欣赏，没人理解它的价值，就只能在仓库里吃灰老去。”
“今天会去很远的地方？”塞梅尔维斯捕捉到了她话里的隐藏意思。
“我们先取吃的——然后出城。”瓦伦缇娜笑了笑，一脚油门，车辆驶入了夜色里。
向北穿行至街口，瓦伦缇娜一记优雅的右转驶向圣·伊什特万大道，车灯扫过一排排亮着的店铺，最终停在一家隐匿在深绿色遮阳蓬后方的西餐馆。这辆车的出现本身就是一种提醒，没过半分钟，一名身着制服的门童从餐馆内快步走出，手里捧着一个包装精美的方形蛋糕盒。
车窗放下，他朝二人举了个躬，塞梅尔维斯顺手接过那只盒子。瓦伦缇娜递出一张作为小费的钞票。
塞梅尔维斯把蛋糕盒放在座位中间，转头看向瓦伦缇娜：“看来你早就安排好了。”
“就在某人呼呼大睡的时候。”她伸手摸了摸塞梅尔维斯的脸，忍不住想亲她，探出的身子却被安全带拦了下来。
“啧。”瓦伦缇娜撇了撇嘴，只得坐正。
“好好开车！”塞梅尔维斯笑着回握了她的手一下便松开了。
双座跑车再次启动，车身驶出布达佩斯最后一段有灯光的街道时，瓦伦缇娜在复杂的中控台上扳动了一个按扭，电子屏从仪表盘下方伸出，她点了播放键，一段熟悉的钢琴前奏响起，如夜风轻抚耳边。
“还是这首啊。”塞梅尔维斯轻声说道。
“这首不好么？我换一个？”
“不，很好，就它吧。”
肖邦《夜曲·作品72第一号》，她们第一次亲吻就是在这首曲子的见证下。不管经过多少年，更换了多少城市，只要旋律响起，她们的时间就会重叠在那个时刻。
“你那时生疏的样子真可爱，塞梅尔维斯。”瓦伦缇娜专注地看着前方，嘴角勾起。
“说得好像你很有经验似的。”乘客发起一记有力的还击。
“可我知道用来呼吸的是鼻子而不是嘴。”司机不甘示弱。
“你还不是照样憋红了脸。”球再次传了回去。
“是谁像个小猫一样又啃又咬？”对方接住了球，替换成逗猫棒。
“打住、你肯定记错了，第一次就咬的绝对不是我。”小猫的脸红了，一把拍掉逗猫棒，单方面宣告获胜，表示不再进行回忆游戏。
瓦伦缇娜忍住笑，手指在方向盘上轻轻点了几下，像是在赞赏小猫的任性。
车窗外的建筑渐渐变得低矮，一望无际的田野里偶尔可见工厂塔楼轮廓。进入M3高速后，城市逐渐在后视镜里消失，平原沉入了暮色里。离开了人工光照明显的区域，深邃的天空也慢慢浮现出更多的星光。
越往东走，夜色越浓，平缓的行驶让塞梅尔维斯起了倦意，在钢琴曲的温柔环绕中闭上了眼。
沿途经过了几个小镇和加油站，大地已经完全覆盖进暗蓝色的幕帷下，从多尔曼德向南转到33号公路又行驶了一段之后，远方已经几乎没有灯光干扰，天空呈现出它真正的深夜。东南方向一道云雾正在升起，从草原尽头流向空中的光之河诞生于地平线。
引擎的声音减弱，塞梅尔维斯感觉到了车速的变化。
“瓦伦缇娜……我们快到了？”她微睁开眼。
“看那里。”瓦伦缇娜指向右前方。
33号公路其中一段从波洛斯洛小镇穿过，旁边是连通着蒂萨河的大片湖泊，下方还建着一个水库，这里也是观鸟和摄影爱好者的圣地。她们正在跨湖的公路穿行，湖泊犹如打磨后的镜面，上升的银河倒影正投射其中，湖面与天穹的星光点点相连。
“我们应该能在11点前进入国家公园。”瓦伦缇娜看了眼仪表盘的时间。
塞梅尔维斯掏出手机查看现在的定位，她们在霍尔托巴吉国家公园以西的位置。这个公园在1999年作为文化遗产被列入《世界遗产名录》，在天文爱好者圈子里是知名的适合观星的暗夜公园。现在早就过了接待游客的时段，但她知道瓦伦缇娜一定有自己的路线规划。
塞梅尔维斯侧着头靠在椅背上，望向湖面，微风拂过后，星光倒影被打碎成了一粒粒银沙。她想象着和所爱的人静静看着银河从地平线升至天顶，或许是她们作为不能在日间活动的最大补偿。
“你是打算开着这辆招摇的跑车从小路闯入么？我都有点心疼这辆车了。”
“它当然会受到神秘术保护，没人知道我们从哪进去的。”瓦伦缇娜笑着启动了预先设置的车辆改装系统，车身通体像包裹了一层无法接近的屏障，就算有人目击到这辆车，也会被“忽视它”的咒语影响，真正的当其不存在。
过了蒂萨河，又沿公路行驶了二十分钟后，车辆一转绕进一条细瘦的碎石小道，这边夜间没有巡逻人员的踪影，石头和野草在车身附近自动展开，簌簌的草叶声提醒着她们正在驶入草原深处。具有本能危险感知的野生动物也纷纷远离这辆载有两个吸血鬼的座驾。
瓦伦缇娜将车稳稳停在野草不高的区域，熄灭车灯。发动机噤声后，世界瞬间安静下来，蛙声和虫鸣开始组成耳边的旋律。她们把外套脱了放在车里，脚踩上柔软的草地，靴子被夜露沾湿。瓦伦缇娜从包里抽出准备好的野餐垫，轻轻一甩，铺在草地上。
塞梅尔维斯靠在车边抬头看了看夜空，如水墨画晕染的银河轮廓从东南方抬起，比刚才路过湖面时所见的角度又高了几分，最亮的那段星云正悄然攀升。她弯腰从车里取出蛋糕盒，放在了餐垫上拆开包装。
里面是她喜欢的红丝绒蛋糕，夹着厚厚的香草奶油霜，顶上点缀着蓝莓、覆盆子和奶油花。店家还好心的配备了金属雕花的刀叉和花纹餐盘，像是从店里直接拿出来的。

“好吧，就半小时。”瓦伦缇娜轻声妥协，手掌出乎意料地只是一动不动放在上面。

肖邦《夜曲·作品72第一号》，她们第一次亲吻就是在这首曲子的见证下。不管经过多少年，更换了多少城市，只要旋律响起，她们的时间就会重叠在那个时刻。
“你那时生疏的样子真可爱，塞梅尔维斯。”瓦伦缇娜专注地看着前方，嘴角勾起。
“说得好像你很有经验似的。”乘客发起一记有力的还击。
“可我知道用来呼吸的是鼻子而不是嘴。”司机不甘示弱。
“你还不是照样憋红了脸。”球再次传了回去。
“是谁像个小猫一样又啃又咬？”对方接住了球，替换成逗猫棒。
“打住、你肯定记错了，第一次就咬的绝对不是我。”小猫的脸红了，一把拍掉逗猫棒，单方面宣告获胜，表示不再进行回忆游戏。
瓦伦缇娜忍住笑，手指在方向盘上轻轻点了几下，像是在赞赏小猫的任性。
车窗外的建筑渐渐变得低矮，一望无际的田野里偶尔可见工厂塔楼轮廓。进入M3高速后，城市逐渐在后视镜里消失，平原沉入了暮色里。离开了人工光照明显的区域，深邃的天空也慢慢浮现出更多的星光。
越往东走，夜色越浓，平缓的行驶让塞梅尔维斯起了倦意，在钢琴曲的温柔环绕中闭上了眼。
沿途经过了几个小镇和加油站，大地已经完全覆盖进暗蓝色的幕帷下，从多尔曼德向南转到33号公路又行驶了一段之后，远方已经几乎没有灯光干扰，天空呈现出它真正的深夜。东南方向一道云雾正在升起，从草原尽头流向空中的光之河诞生于地平线。
引擎的声音减弱，塞梅尔维斯感觉到了车速的变化。
“瓦伦缇娜……我们快到了？”她微睁开眼。
“看那里。”瓦伦缇娜指向右前方。
33号公路其中一段从波洛斯洛小镇穿过，旁边是连通着蒂萨河的大片湖泊，下方还建着一个水库，这里也是观鸟和摄影爱好者的圣地。她们正在跨湖的公路穿行，湖泊犹如打磨后的镜面，上升的银河倒影正投射其中，湖面与天穹的星光点点相连。
“我们应该能在11点前进入国家公园。”瓦伦缇娜看了眼仪表盘的时间。
塞梅尔维斯掏出手机查看现在的定位，她们在霍尔托巴吉国家公园以西的位置。这个公园在1999年作为文化遗产被列入《世界遗产名录》，在天文爱好者圈子里是知名的适合观星的暗夜公园。现在早就过了接待游客的时段，但她知道瓦伦缇娜一定有自己的路线规划。
塞梅尔维斯侧着头靠在椅背上，望向湖面，微风拂过后，星光倒影被打碎成了一粒粒银沙。她想象着和所爱的人静静看着银河从地平线升至天顶，或许是她们作为不能在日间活动的最大补偿。
“你是打算开着这辆招摇的跑车从小路闯入么？我都有点心疼这辆车了。”
“它当然会受到神秘术保护，没人知道我们从哪进去的。”瓦伦缇娜笑着启动了预先设置的车辆改装系统，车身通体像包裹了一层无法接近的屏障，就算有人目击到这辆车，也会被“忽视它”的咒语影响，真正的当其不存在。
过了蒂萨河，又沿公路行驶了二十分钟后，车辆一转绕进一条细瘦的碎石小道，这边夜间没有巡逻人员的踪影，石头和野草在车身附近自动展开，簌簌的草叶声提醒着她们正在驶入草原深处。具有本能危险感知的野生动物也纷纷远离这辆载有两个吸血鬼的座驾。
瓦伦缇娜将车稳稳停在野草不高的区域，熄灭车灯。发动机噤声后，世界瞬间安静下来，蛙声和虫鸣开始组成耳边的旋律。她们把外套脱了放在车里，脚踩上柔软的草地，靴子被夜露沾湿。瓦伦缇娜从包里抽出准备好的野餐垫，轻轻一甩，铺在草地上。
塞梅尔维斯靠在车边抬头看了看夜空，如水墨画晕染的银河轮廓从东南方抬起，比刚才路过湖面时所见的角度又高了几分，最亮的那段星云正悄然攀升。她弯腰从车里取出蛋糕盒，放在了餐垫上拆开包装。

那扇窗被厚重的窗帘遮蔽，唯有夜色知晓房间的主人从不与白昼相见。
瓦伦缇娜和塞梅尔维斯就住在一间画廊的楼上，这间画廊自然也是年长血食怪的一项投资。
夏季的楤树枝叶茂密，被街灯投下斑驳的树影，轻轻摇晃着，映在了刚好掀开窗帘的女主人脸上。瓦伦缇娜靠着窗台，歪头看向蓝色逐渐褪去的夜空，城市的灯光使得狭窄的天幕间只有零星的亮点。
“塞梅尔维斯，今晚跟我去个地方？”她回头对还在床上蒙头不肯起的恋人提议道。
被子动了动，里面的人没有更多回应。
瓦伦缇娜走回床边半倚着床头，一手拨开塞梅尔维斯的长发，亲了亲她的额角。
“有间新开的餐馆，据说甜点是他们的招牌。”她说着，手指在塞梅尔维斯裸露的肩上画圈，“我订了今晚的位置。你要再不起来，我就……”
话音未落，她的手被塞梅尔维斯一把攥住，拉进了轻薄的夏被里，按在了自己依旧缓慢跳动的心脏之上。
“我还不饿。”她的声音慵懒，脸在瓦伦缇娜的手臂上蹭了蹭，“让我再睡半小时。”
瓦伦缇娜看了眼墙上的古典挂钟，时针已经指向了八的数字。她笑了，这样撒娇的塞梅尔维斯不多见，通常只存在于第二天没有基金会委派的任务，而她又确实疲惫过度时才会像这样抱着自己不撒手。瓦伦缇娜在被子里的手向下挪了挪，托住那团温热柔软的重量。
“好吧，就半小时。”瓦伦缇娜轻声妥协，手掌出乎意料地只是一动不动放在上面。
当然，这只不过是倒计时响起前的平静时光罢了。
塞梅尔维斯的鼻息很快趋于平缓，瓦伦缇娜坐在床沿，打开了手机，调低了亮度，在导航应用上输入了一个准备已久的地点。那家餐馆的甜点或许美味，却并不是今晚的重头戏。她又看了眼邮箱，未读信件里提到几件拍品的交接时间还没确认，助手留言说新送到的一幅画画框有些破损，询问修复事宜，她边回复邮件边瞥了一眼塞梅尔维斯，熟睡的样子让人不忍心打扰。
手机里的时间一分分走过，三十分钟比想象中更快。
瓦伦缇娜稍稍活动了那只被压住而有点发麻的手，依旧被塞梅尔维斯抱得很紧。
“宝贝。”她低声呼唤了一句，恋人纹丝未动，她叹了口气，无论如何也要行使闹钟的职责了。
她的手掌微微下沉，像按下某个无形的开关，屈起手指在某个特定敏感处拨挠着。
“嗯……”塞梅尔维斯眉头一皱，睫毛颤了颤，从梦境和清醒的夹缝中挣扎出一声低吟。
“该起床了亲爱的，时间不等人。”瓦伦缇娜低头俯视她，发梢垂到了她脸上，手指的力度加重了几分。
“……哼。”塞梅尔维斯的手从被子里摸索出来圈住了她的腰，喃喃说道，“希望这家店的东西真有那么好吃，值得我牺牲睡眠。”
半小时后，她们换好了衣服。瓦伦缇娜从鞋柜抽屉取出一张野餐垫装进了包里。
“你带它干什么？我们要在人家餐厅大堂里坐下野餐么？”塞梅尔维斯露出不解的眼神。
“我们要去一个适合享用美食的地方。”瓦伦缇娜以惯有的狡黠笑意掩盖了真正目的地，并且“美食”对她来说可能还有另一层含义。
塞梅尔维斯似乎读出了话外音，瞪了她一眼。
夏夜渐深，穿着长风衣的二人在微风拂过的街道上甚至感到凉爽。瓦伦缇娜按下车库的遥控，画廊对面的金属卷门升起，如钢琴低音区的机械响声给静谧的古董街带来了夜间的一丝躁动。一辆酒红色流线型的阿尔法·罗密欧 33 Stradale静静地卧在里面，车门向上打开，如伸展出了羽翼。
“你就不能开辆普通的车？”塞梅尔维斯坐进副驾，系上安全带，“我都能想到明天社交平台上又有带着这辆车照片的帖子出现了。”
虽然这辆2023年复刻的限量复古跑车出现在大众视野的机会不多，但邻近几家店铺老板时常望向车库的位置，他们都知道这是属于一位身份神秘的画廊老板所有。每它在街边短暂停靠，都会引来一群爱车人士和游客驻足围观。
“车买了就是用来开的。平时去的地方近，也没多少机会用它。”瓦伦缇娜坐进驾驶位，两边的车门缓缓落下，“真正的好东西若无人欣赏，没人理解它的价值，就只能在仓库里吃灰老去。”
“今天会去很远的地方？”塞梅尔维斯捕捉到了她话里的隐藏意思。
“我们先取吃的——然后出城。”瓦伦缇娜笑了笑，一脚油门，车辆驶入了夜色里。
向北穿行至街口，瓦伦缇娜一记优雅的右转驶向圣·伊什特万大道，车灯扫过一排排亮着的店铺，最终停在一家隐匿在深绿色遮阳蓬后方的西餐馆。这辆车的出现本身就是一种提醒，没过半分钟，一名身着制服的门童从餐馆内快步走出，手里捧着一个包装精美的方形蛋糕盒。
车窗放下，他朝二人举了个躬，塞梅尔维斯顺手接过那只盒子。瓦伦缇娜递出一张作为小费的钞票。
塞梅尔维斯把蛋糕盒放在座位中间，转头看向瓦伦缇娜：“看来你早就安排好了。”
“就在某人呼呼大睡的时候。”她伸手摸了摸塞梅尔维斯的脸，忍不住想亲她，探出的身子却被安全带拦了下来。
“啧。”瓦伦缇娜撇了撇嘴，只得坐正。
“好好开车！”塞梅尔维斯笑着回握了她的手一下便松开了。
双座跑车再次启动，车身驶出布达佩斯最后一段有灯光的街道时，瓦伦缇娜在复杂的中控台上扳动了一个按扭，电子屏从仪表盘下方伸出，她点了播放键，一段熟悉的钢琴前奏响起，如夜风轻抚耳边。
“还是这首啊。”塞梅尔维斯轻声说道。
“这首不好么？我换一个？”
“不，很好，就它吧。”

塞梅尔维斯靠在车边抬头看了看夜空，如水墨画晕染的银河轮廓从东南方抬起，比刚才路过湖面时所见的角度又高了几分，最亮的那段星云正悄然攀升。她弯腰从车里取出蛋糕盒，放在了餐垫上拆开包装。
里面是她喜欢的红丝绒蛋糕，夹着厚厚的香草奶油霜，顶上点缀着蓝莓、覆盆子和奶油花。店家还好心的配备了金属雕花的刀叉和花纹餐盘，像是从店里直接拿出来的。
她切下一半，装进餐盘里递给已经坐下、正仰头看着星河的恋人。
“喂我。”瓦伦缇娜张嘴，指了指自己，她的獠牙还未伸长。
塞梅尔维斯蹙眉，用叉子直接切了一小块放在了瓦伦缇娜的舌头上。舌尖轻轻卷起那块蛋糕含进口中，红丝绒与奶油在嘴里融化，瓦伦缇娜发出满意的赞叹。塞梅尔维斯切了另一块自己尝了一口，细腻而有层次的口感让她也不由得睁大了双眼，就在她要吃第二口的时候，瓦伦缇娜凑近，吻上了她的唇。"><link rel=canonical href=https://fukki.org/posts/%E5%90%8C%E8%BD%A8/></head><body class="bg-(--bg) text-black antialiased duration-200 ease-out [-webkit-tap-highlight-color:transparent] dark:text-white"><header class="mx-auto flex h-[4.5rem] max-w-(--w) px-8 whitespace-nowrap lg:justify-center"><div class="relative z-50 flex items-center ltr:mr-auto rtl:ml-auto"><a class="-translate-y-[1px] text-2xl font-medium" href=https://fukki.org/>有空写点-测试版</a><div class="btn-dark text-[0px] ltr:ml-4 rtl:mr-4 h-6 w-6 shrink-0 cursor-pointer [background:url(./theme.png)_left_center/_auto_theme('spacing.6')_no-repeat] [transition:_background-position_0.4s_steps(5)] dark:[background-position:right]" role=button aria-label=Dark></div></div><div class="btn-menu relative z-50 flex h-[4.5rem] w-[5rem] shrink-0 cursor-pointer flex-col items-center justify-center gap-2.5 lg:hidden ltr:-mr-8 rtl:-ml-8" role=button aria-label=Menu></div><script>const htmlClass=document.documentElement.classList;setTimeout(()=>{htmlClass.remove("not-ready")},10);const btnMenu=document.querySelector(".btn-menu");btnMenu.addEventListener("click",()=>{htmlClass.toggle("open")});const metaTheme=document.querySelector('meta[name="theme-color"]'),lightBg="#faf8f1".replace(/"/g,""),setDark=e=>{metaTheme.setAttribute("content",e?"rgb(0 0 0 / 85%)":lightBg),htmlClass[e?"add":"remove"]("dark"),localStorage.setItem("dark",e)},darkScheme=window.matchMedia("(prefers-color-scheme: dark)");if(htmlClass.contains("dark"))setDark(!0);else{const e=localStorage.getItem("dark");setDark(e?e==="true":darkScheme.matches)}darkScheme.addEventListener("change",e=>{setDark(e.matches)});const btnDark=document.querySelector(".btn-dark");btnDark.addEventListener("click",()=>{setDark(localStorage.getItem("dark")!=="true")})</script><div class="nav-wrapper fixed inset-x-0 top-full z-40 flex h-full flex-col
