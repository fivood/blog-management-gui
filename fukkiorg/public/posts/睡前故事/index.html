　　窗外雨声潺潺，放在平时，塞梅尔维斯一定早就睡着了。但此时低压的云层就像压在她肩上的未完成工作，即便困意十足，大脑仍为了理清第二日报告如何交付而拒绝入睡。
　　“你盯着天花板五分钟了，要是不喜欢它的颜色我们可以换一个。”瓦伦缇娜侧过身，撑着头靠在枕边，一缕长发垂在塞梅尔维斯脸上。她竟然无动于衷，今天的恋人不对劲。
　　塞梅尔维斯翻了个身，背对她，一股有气无力的声音传来：“我只是脑子还没停转，过几小时可能就好了。”
　　“要不我给你讲个小故事？反正睡不着听一听没什么损失，要是觉得无聊听困了，那也算件好事？”瓦伦缇娜说着，手已经探向了她的腰。怀里的人依旧没有转过来，但向她挪了挪身子，似乎是同意了说故事的提议。瓦伦缇娜放在她腰上手又往自己的方向用了点力，把下巴搁在塞梅尔维斯颈窝上。
　　“那是在我搬到维也纳之前的事了。”她放轻语调，开始讲述一个遥远的过去。
　　“十九世纪初的一个春末，我随一位奥地利女伯爵马车旅行，在林茨附近沿着多瑙河岸寻找适合定居的庄园。她有一些人脉，推荐了几处地点，按由北向南的路线逐一带我参观考察。”
　　“那时候沿岸村镇为了小心应对去年冬天留下的狼患，一入夜就封门闭户，我们想夜间投宿都成了困难。你知道，我白天也不便外出活动，参观都只能定在夜间。”
　　塞梅尔维斯身子动了动，小声说了句：“女伯爵知道你的身份么？”
　　瓦伦缇娜噗嗤一笑，手向上拽住她睡衣领口说：“你要不要好好听讲？这不是互动游戏故事，打断故事一次我可就要解一颗了。”话音还没落，最靠上的那颗扣子已经离开了扣眼的束缚。
　　塞梅尔维斯不再说话，她知道身后的老血食怪说得出做得到，现在的情况比起有些时候没经过犯罪预告就动手的情况还是好上不少。
　　“……既然在镇里无处可歇，我们便提前前往下一处庄园。那里是战后弃用的地产，在多瑙河支流拐弯的高地上。曾经的宅邸主人是个收藏狂热者，去世前还在休整地下室。”
　　她的手回到腰间，顺着脊椎滑向塞梅尔维斯肩胛，像不经意地描摹着她的骨骼结构。
　　“宅邸占地不小，最初可能建立于12世纪，外观是破旧但经典的哥特式风格。白色墙面已经斑驳，杂草也长了半人高。这栋庄园本应是没人的，奇怪的是屋里却有人提前点起了火。女伯爵说是管理员留下的，外面也正下着雨，我便不再多疑。进门时还能看见壁炉边放着刚换的酒杯和毛毯。”
　　“真贴心。”
　　这句话瓦伦缇娜不能装没听见，她解开第二颗扣子，手却也被塞梅尔维斯捉住了。
　　“我那天夜里失眠，坐在书房里翻阅这房子留下的旧文稿。雨声、火光、羊皮纸……加上一丝不知道哪里飘来的玫瑰香，像一种梦幻的组合。不一会儿，女伯爵出现了。”
　　塞梅尔维斯偏了偏肩膀，甩开了瓦伦缇娜贴近的脸。
　　“她问我要不要喝一点酒，我说好。她端来一杯琥珀色的甜酒，我接过的时候碰到了她的手，冰冷得像深夜的冻雨。她坐到我身边，眼神就像雨夜远方的风景，什么都看不出来。然后她说——‘我注意你很久了。你身上有种气味……’”
　　瓦伦缇娜觉得自己的手被塞梅尔维斯狠捏了一下。
　　“我当时的酒量并不好，那杯酒几口下肚后就有些恍惚。我也不知道怎么就坐到了她腿上——”
　　“然后她就吻你了。”塞梅尔维斯翻了个身，她已经猜出瓦伦缇娜的故事结局，“然后你就顺势把我——我是说，她把‘你’推倒在书桌上，壁炉烧得噼啪响，雨下个不停，早上起来你们两个衣服都不知道扔哪儿了对不对？”
　　“是‘我们两个’。”瓦伦缇娜终于憋不住，笑得直用另一只手抹眼泪。
　　“早在你说酒杯和毛毯的时候我就该怀疑了，也不至于生了半天闷气等你说自己酒量不好才反应过来。你编故事的速度倒是挺快的。”
　　瓦伦缇娜把她抱进怀里：“都说了是故事，别那么带入嘛，我也是二次加工罢了。这不就为了帮你放松，让你好睡一点？”
　　“用色诱故事让我放松，你不如直接给我灌镇静剂。”
　　“可我觉得你身子比刚才放松多了。”瓦伦缇娜低头亲她额角，“你要是真困得睡着了，我就原谅你刚才那句‘推倒在书桌上’。”
　　“那句有什么问题？”
　　“你居然不让我描述完坐到腿上的事，我还没说女伯爵的眼睛变化呢，太伤人了。”
　　“你眼睛什么变化我还能不知道？明明是你瞎编的太快出现破绽。”
　　“我可以继续慢慢编——”瓦伦缇娜不知何时已经把塞梅尔维斯的扣子全解开，手也放在了她早就想放的地方，“比如，下一部分是‘第二天女伯爵抚摸着你的秀发，问你昨晚舒——”
　　“……闭嘴。”
　　这句斥责已经含混不清，塞梅尔维斯睫毛静静垂下，鼻息绵长，像终于卸下了数日奔波后紧绷的防备。
　　关于那个雨夜的哥特宅邸，那是另一个故事了。
　　她们的另一个故事。
2
　　世界被大雨吞没于墨色之下，只有偶尔划破天幕的闪电照亮那座山林间伫立的宅邸轮廓。车轮陷入泥泞，马匹不安嘶鸣，这样的风雨，伞也失去了效用。塞梅尔维斯系紧了披风，在闷雷声中下了马车。
　　她出现在这里完全是受了瓦伦缇娜的“休假”诱惑。前一天晚上，瓦伦缇娜对她说有一位老友发来邀请，偶然寻得的古老庄园修整完毕可接待来客，所处地点僻静又风景宜人。她的任务一结束后遍可直接前往，而瓦伦缇娜会提前过去等她。可谁知今日大雨突至，她差点被困在水坑的马车里过夜。
　　宅邸前门半敞，像是特地为访客登门准备的缝隙。火光从缝隙里透出，隐约能看见高大廊柱投下的阴影。
　　塞梅尔维斯轻轻推门而入。厅堂点了几个火盆，屋内的暖意让她终于忘记一路的颠簸，她解下湿透了的披风，摘下帽子，搭在门厅里的衣架上。
　　“你总算到了，”瓦伦缇娜的声音从楼梯口传来，带着一如既往的笑意，“我还以为你要淹在山脚下了。”
　　“瞧你挑的好天气，你倒是悠闲。”塞梅尔维斯看着一步步走近的瓦伦缇娜，下楼时裙摆拂地，披散的棕发随着踏步的节奏轻轻摆动，她才算有了开始休假的感觉。
　　瓦伦缇娜拿过壁炉边的毛毯给她擦了擦被雨打湿的发尾，摸着她冰冷的脸，亲了一下她的嘴角，走到门口把大门关严，从内锁上了。
　　“你的朋友呢？没有其他人了？”塞梅尔维斯有些奇怪，这里闻不到多人聚会的气息。
　　“只有我们两人。我保证今晚的招待能让你忘记疲惫。”
　　“你邀请我来就是为了这一晚？”
　　“亲爱的，你应该享受假期了。”瓦伦缇娜眼角带笑，“快上楼把湿衣服换了，有亮光的那间屋子。我去准备点喝的。”
　　塞梅尔维斯走上翻修过的长扶梯，二楼的走廊在壁灯火光的映照下仍然深不见底，这栋宅邸比从正门看上去更大。瓦伦缇娜说的屋子是一件与卧室相连的书房，更像是在原本用于就寝的卧室新增了阅读的区域。她换上了一眼就知道是瓦伦缇娜准备的那件睡袍。
　　没几分钟，瓦伦缇娜酒提着一瓶酒和两个杯子进来了。塞梅尔维斯正好奇地翻着摆在书桌上的古籍。瓦伦缇娜倒满两个酒杯，坐在铺着黑金流纹织布的双人沙发上对她发来邀约。塞梅尔维斯本想靠着沙发一角安静喝酒阅读，但那人正好居中而坐，两边都没留下多少空隙。
　　“故意的？”塞梅尔维斯跨坐到她腿上，低头看着逐渐贴近的距离。
　　“你不是早该习惯了？”瓦伦缇娜递过来一杯酒，她喝了一小口自己那杯后就放在了一旁的书桌上，“你知道的，靠近你我就想……”
　　塞梅尔维斯接过酒杯一饮而尽，仿佛里面没含酒精，只是解渴的甘露。没等瓦伦缇娜说完，空杯子就松手掉到沙发角落，她主动吻了上去。猝不及防的亲吻，又像蓄谋已久的诱惑。她尝到了瓦伦缇娜口中的酒意，也尝到了咬破对方嘴唇时血的气息。
　　瓦伦缇娜的舌头也进到了她嘴里，宽松的睡袍被一双手从肩头拨落，垂至腰间系带处，那双手又不怀好意地搓揉起她裸露的胸。
　　时轻时重的挤压，指尖若有若无的拨弄，塞梅尔维斯被挑逗得不自觉挺起了腰。
　　瓦伦缇娜抬起双腿将她带高，低头咬住变硬了的顶端，膝盖故意顶到了她下身感到火热的位置。
　　“嗯……啊……”塞梅尔维斯搂住瓦伦缇娜后颈，手指穿过她的发丝轻轻抚摸。瓦伦缇娜的舌尖绕着她乳头舔舐，轻咬后又吸吮，一只手在另一边做着同样的事，酒意来得很快，她不由得闭上了眼，胸口大幅度起伏，接连发出了平时吝于表露的呻吟声。
　　“哈……瓦伦……缇娜……我、”塞梅尔维斯吞咽了一次，说话已不成句子，“我想……”
　　瓦伦缇娜没有停下手里和舌头的动作，反而更加重了吸咬和揉捏的力道，直至塞梅尔维斯的喘息声越来越大。
　　“啊……你别……！”塞梅尔维斯蹭着她的腿想要缓解身下的不适，她有些后悔，明明早知会如此为什么没提前把内裤脱了。
　　像是终于听懂她的请求，瓦伦缇娜托起她的后臀和腰，把她抱到了那张散发着旧书墨香的桌上推倒，帮她把腿抬上桌后自己也爬了上去，坐在她身上，解开了睡袍最后的维系，如床单一样在桌面铺开。瓦伦缇娜脱掉了自己的连衣长裙，整个人压上了塞梅尔维斯，两根手指伸进了她内裤，在湿润的穴口外来回划过，让液体裹满手指。
　　“瓦……瓦伦……哈……啊、啊……我……你……！”
　　持续的外部刺激并不能让塞梅尔维斯满足，反而急得扭起来。
　　瓦伦缇娜吻住她嘴唇的同时将手指推入，最后的那句呻吟被堵在了嘴里。她舔着塞梅尔维斯的尖牙，逗弄她的舌头，手腕缓缓用力让双指在她体内进出。
　　栗色大实木书桌在她们交缠的身体运动下只是发出轻微的吱呀回应，几本书被推开。空旷的房间把一次次的碰撞声放大，仿佛整座宅邸都能听见这个回响。两名吸血鬼在哥特式的城堡里交合，飞溅的血液洒落在书上、滴落到桌上、染红了睡袍，只有凌乱的桌面记下了这个夜晚。
　　塞梅尔维斯蜷起的腿夹住瓦伦缇娜，伸手握住她的手腕，颤抖地摸到她的手背，想要一起施力让她进到更深处。瓦伦缇娜顺着她的节奏推进，自己的呼息却渐渐紊乱。
　　“哈……！”塞梅尔维斯仰起头大口喘气，她快撑不住了，扶着的手垂到桌上，想拼命抓起什么，只抓住了睡袍系带。
　　瓦伦缇娜速度加快，嘴贴在她脖子上没有咬下，她要塞梅尔维斯一心感受自己在下方的动作。睡袍在手的抽送和腰的前挺下脱离了桌面，滑落至地毯。塞梅尔维斯抱紧了瓦伦缇娜，没了睡袍，桌上沾满了两人的汗珠。
　　几次深深推进后，手指感受到一阵收缩的绞痛，瓦伦缇娜的牙也瞬间咬进了塞梅尔维斯脖颈，胡乱吸取她的血液，像是要把消耗的体力全补回来。塞梅尔维斯几乎晕眩，脖子只能感受到酥麻，她搂着恋人慢慢释放高潮后的余韵，因失血而涌起的微妙愉悦让紧贴的心跳逐渐同步。
　　接下来的一切，塞梅尔维斯都记不太清，只记得火光依旧摇曳，雨声也持续到了天明，她在温暖的绒被里醒来，那个整晚不知疲惫的血食怪还圈着她的腰睡得极香。

“宅邸占地不小，最初可能建立于12世纪，外观是破旧但经典的哥特式风格。白色墙面已经斑驳，杂草也长了半人高。这栋庄园本应是没人的，奇怪的是屋里却有人提前点起了火。女伯爵说是管理员留下的，外面也正下着雨，我便不再多疑。进门时还能看见壁炉边放着刚换的酒杯和毛毯。”
“真贴心。”
这句话瓦伦缇娜不能装没听见，她解开第二颗扣子，手却也被塞梅尔维斯捉住了。
“我那天夜里失眠，坐在书房里翻阅这房子留下的旧文稿。雨声、火光、羊皮纸……加上一丝不知道哪里飘来的玫瑰香，像一种梦幻的组合。不一会儿，女伯爵出现了。”
塞梅尔维斯偏了偏肩膀，甩开了瓦伦缇娜贴近的脸。
“她问我要不要喝一点酒，我说好。她端来一杯琥珀色的甜酒，我接过的时候碰到了她的手，冰冷得像深夜的冻雨。她坐到我身边，眼神就像雨夜远方的风景，什么都看不出来。然后她说——‘我注意你很久了。你身上有种气味……’”
瓦伦缇娜觉得自己的手被塞梅尔维斯狠捏了一下。
“我当时的酒量并不好，那杯酒几口下肚后就有些恍惚。我也不知道怎么就坐到了她腿上——”
“然后她就吻你了。”塞梅尔维斯翻了个身，她已经猜出瓦伦缇娜的故事结局，“然后你就顺势把我——我是说，她把‘你’推倒在书桌上，壁炉烧得噼啪响，雨下个不停，早上起来你们两个衣服都不知道扔哪儿了对不对？”
“是‘我们两个’。”瓦伦缇娜终于憋不住，笑得直用另一只手抹眼泪。
“早在你说酒杯和毛毯的时候我就该怀疑了，也不至于生了半天闷气等你说自己酒量不好才反应过来。你编故事的速度倒是挺快的。”
瓦伦缇娜把她抱进怀里：“都说了是故事，别那么带入嘛，我也是二次加工罢了。这不就为了帮你放松，让你好睡一点？”
“用色诱故事让我放松，你不如直接给我灌镇静剂。”
“可我觉得你身子比刚才放松多了。”瓦伦缇娜低头亲她额角，“你要是真困得睡着了，我就原谅你刚才那句‘推倒在书桌上’。”
“那句有什么问题？”
“你居然不让我描述完坐到腿上的事，我还没说女伯爵的眼睛变化呢，太伤人了。”
“你眼睛什么变化我还能不知道？明明是你瞎编的太快出现破绽。”
“我可以继续慢慢编——”瓦伦缇娜不知何时已经把塞梅尔维斯的扣子全解开，手也放在了她早就想放的地方，“比如，下一部分是‘第二天女伯爵抚摸着你的秀发，问你昨晚舒——”
“……闭嘴。”
这句斥责已经含混不清，塞梅尔维斯睫毛静静垂下，鼻息绵长，像终于卸下了数日奔波后紧绷的防备。
关于那个雨夜的哥特宅邸，那是另一个故事了。
她们的另一个故事。

世界被大雨吞没于墨色之下，只有偶尔划破天幕的闪电照亮那座山林间伫立的宅邸轮廓。车轮陷入泥泞，马匹不安嘶鸣，这样的风雨，伞也失去了效用。塞梅尔维斯系紧了披风，在闷雷声中下了马车。
她出现在这里完全是受了瓦伦缇娜的“休假”诱惑。前一天晚上，瓦伦缇娜对她说有一位老友发来邀请，偶然寻得的古老庄园修整完毕可接待来客，所处地点僻静又风景宜人。她的任务一结束后遍可直接前往，而瓦伦缇娜会提前过去等她。可谁知今日大雨突至，她差点被困在水坑的马车里过夜。
宅邸前门半敞，像是特地为访客登门准备的缝隙。火光从缝隙里透出，隐约能看见高大廊柱投下的阴影。
塞梅尔维斯轻轻推门而入。厅堂点了几个火盆，屋内的暖意让她终于忘记一路的颠簸，她解下湿透了的披风，摘下帽子，搭在门厅里的衣架上。
“你总算到了，”瓦伦缇娜的声音从楼梯口传来，带着一如既往的笑意，“我还以为你要淹在山脚下了。”
“瞧你挑的好天气，你倒是悠闲。”塞梅尔维斯看着一步步走近的瓦伦缇娜，下楼时裙摆拂地，披散的棕发随着踏步的节奏轻轻摆动，她才算有了开始休假的感觉。
瓦伦缇娜拿过壁炉边的毛毯给她擦了擦被雨打湿的发尾，摸着她冰冷的脸，亲了一下她的嘴角，走到门口把大门关严，从内锁上了。
“你的朋友呢？没有其他人了？”塞梅尔维斯有些奇怪，这里闻不到多人聚会的气息。
“只有我们两人。我保证今晚的招待能让你忘记疲惫。”
“你邀请我来就是为了这一晚？”
“亲爱的，你应该享受假期了。”瓦伦缇娜眼角带笑，“快上楼把湿衣服换了，有亮光的那间屋子。我去准备点喝的。”
塞梅尔维斯走上翻修过的长扶梯，二楼的走廊在壁灯火光的映照下仍然深不见底，这栋宅邸比从正门看上去更大。瓦伦缇娜说的屋子是一件与卧室相连的书房，更像是在原本用于就寝的卧室新增了阅读的区域。她换上了一眼就知道是瓦伦缇娜准备的那件睡袍。
没几分钟，瓦伦缇娜酒提着一瓶酒和两个杯子进来了。塞梅尔维斯正好奇地翻着摆在书桌上的古籍。瓦伦缇娜倒满两个酒杯，坐在铺着黑金流纹织布的双人沙发上对她发来邀约。塞梅尔维斯本想靠着沙发一角安静喝酒阅读，但那人正好居中而坐，两边都没留下多少空隙。
“故意的？”塞梅尔维斯跨坐到她腿上，低头看着逐渐贴近的距离。
“你不是早该习惯了？”瓦伦缇娜递过来一杯酒，她喝了一小口自己那杯后就放在了一旁的书桌上，“你知道的，靠近你我就想……”
塞梅尔维斯接过酒杯一饮而尽，仿佛里面没含酒精，只是解渴的甘露。没等瓦伦缇娜说完，空杯子就松手掉到沙发角落，她主动吻了上去。猝不及防的亲吻，又像蓄谋已久的诱惑。她尝到了瓦伦缇娜口中的酒意，也尝到了咬破对方嘴唇时血的气息。
瓦伦缇娜的舌头也进到了她嘴里，宽松的睡袍被一双手从肩头拨落，垂至腰间系带处，那双手又不怀好意地搓揉起她裸露的胸。
时轻时重的挤压，指尖若有若无的拨弄，塞梅尔维斯被挑逗得不自觉挺起了腰。
瓦伦缇娜抬起双腿将她带高，低头咬住变硬了的顶端，膝盖故意顶到了她下身感到火热的位置。
“嗯……啊……”塞梅尔维斯搂住瓦伦缇娜后颈，手指穿过她的发丝轻轻抚摸。瓦伦缇娜的舌尖绕着她乳头舔舐，轻咬后又吸吮，一只手在另一边做着同样的事，酒意来得很快，她不由得闭上了眼，胸口大幅度起伏，接连发出了平时吝于表露的呻吟声。
“哈……瓦伦……缇娜……我、”塞梅尔维斯吞咽了一次，说话已不成句子，“我想……”
瓦伦缇娜没有停下手里和舌头的动作，反而更加重了吸咬和揉捏的力道，直至塞梅尔维斯的喘息声越来越大。
“啊……你别……！”塞梅尔维斯蹭着她的腿想要缓解身下的不适，她有些后悔，明明早知会如此为什么没提前把内裤脱了。
像是终于听懂她的请求，瓦伦缇娜托起她的后臀和腰，把她抱到了那张散发着旧书墨香的桌上推倒，帮她把腿抬上桌后自己也爬了上去，坐在她身上，解开了睡袍最后的维系，如床单一样在桌面铺开。瓦伦缇娜脱掉了自己的连衣长裙，整个人压上了塞梅尔维斯，两根手指伸进了她内裤，在湿润的穴口外来回划过，让液体裹满手指。
“瓦……瓦伦……哈……啊、啊……我……你……！”
持续的外部刺激并不能让塞梅尔维斯满足，反而急得扭起来。
瓦伦缇娜吻住她嘴唇的同时将手指推入，最后的那句呻吟被堵在了嘴里。她舔着塞梅尔维斯的尖牙，逗弄她的舌头，手腕缓缓用力让双指在她体内进出。
栗色大实木书桌在她们交缠的身体运动下只是发出轻微的吱呀回应，几本书被推开。空旷的房间把一次次的碰撞声放大，仿佛整座宅邸都能听见这个回响。两名吸血鬼在哥特式的城堡里交合，飞溅的血液洒落在书上、滴落到桌上、染红了睡袍，只有凌乱的桌面记下了这个夜晚。
塞梅尔维斯蜷起的腿夹住瓦伦缇娜，伸手握住她的手腕，颤抖地摸到她的手背，想要一起施力让她进到更深处。瓦伦缇娜顺着她的节奏推进，自己的呼息却渐渐紊乱。
“哈……！”塞梅尔维斯仰起头大口喘气，她快撑不住了，扶着的手垂到桌上，想拼命抓起什么，只抓住了睡袍系带。
瓦伦缇娜速度加快，嘴贴在她脖子上没有咬下，她要塞梅尔维斯一心感受自己在下方的动作。睡袍在手的抽送和腰的前挺下脱离了桌面，滑落至地毯。塞梅尔维斯抱紧了瓦伦缇娜，没了睡袍，桌上沾满了两人的汗珠。

世界被大雨吞没于墨色之下，只有偶尔划破天幕的闪电照亮那座山林间伫立的宅邸轮廓。车轮陷入泥泞，马匹不安嘶鸣，这样的风雨，伞也失去了效用。塞梅尔维斯系紧了披风，在闷雷声中下了马车。
她出现在这里完全是受了瓦伦缇娜的“休假”诱惑。前一天晚上，瓦伦缇娜对她说有一位老友发来邀请，偶然寻得的古老庄园修整完毕可接待来客，所处地点僻静又风景宜人。她的任务一结束后遍可直接前往，而瓦伦缇娜会提前过去等她。可谁知今日大雨突至，她差点被困在水坑的马车里过夜。
宅邸前门半敞，像是特地为访客登门准备的缝隙。火光从缝隙里透出，隐约能看见高大廊柱投下的阴影。
塞梅尔维斯轻轻推门而入。厅堂点了几个火盆，屋内的暖意让她终于忘记一路的颠簸，她解下湿透了的披风，摘下帽子，搭在门厅里的衣架上。
“你总算到了，”瓦伦缇娜的声音从楼梯口传来，带着一如既往的笑意，“我还以为你要淹在山脚下了。”
“瞧你挑的好天气，你倒是悠闲。”塞梅尔维斯看着一步步走近的瓦伦缇娜，下楼时裙摆拂地，披散的棕发随着踏步的节奏轻轻摆动，她才算有了开始休假的感觉。
瓦伦缇娜拿过壁炉边的毛毯给她擦了擦被雨打湿的发尾，摸着她冰冷的脸，亲了一下她的嘴角，走到门口把大门关严，从内锁上了。
“你的朋友呢？没有其他人了？”塞梅尔维斯有些奇怪，这里闻不到多人聚会的气息。
“只有我们两人。我保证今晚的招待能让你忘记疲惫。”
“你邀请我来就是为了这一晚？”
“亲爱的，你应该享受假期了。”瓦伦缇娜眼角带笑，“快上楼把湿衣服换了，有亮光的那间屋子。我去准备点喝的。”
塞梅尔维斯走上翻修过的长扶梯，二楼的走廊在壁灯火光的映照下仍然深不见底，这栋宅邸比从正门看上去更大。瓦伦缇娜说的屋子是一件与卧室相连的书房，更像是在原本用于就寝的卧室新增了阅读的区域。她换上了一眼就知道是瓦伦缇娜准备的那件睡袍。
没几分钟，瓦伦缇娜酒提着一瓶酒和两个杯子进来了。塞梅尔维斯正好奇地翻着摆在书桌上的古籍。瓦伦缇娜倒满两个酒杯，坐在铺着黑金流纹织布的双人沙发上对她发来邀约。塞梅尔维斯本想靠着沙发一角安静喝酒阅读，但那人正好居中而坐，两边都没留下多少空隙。
“故意的？”塞梅尔维斯跨坐到她腿上，低头看着逐渐贴近的距离。
“你不是早该习惯了？”瓦伦缇娜递过来一杯酒，她喝了一小口自己那杯后就放在了一旁的书桌上，“你知道的，靠近你我就想……”
塞梅尔维斯接过酒杯一饮而尽，仿佛里面没含酒精，只是解渴的甘露。没等瓦伦缇娜说完，空杯子就松手掉到沙发角落，她主动吻了上去。猝不及防的亲吻，又像蓄谋已久的诱惑。她尝到了瓦伦缇娜口中的酒意，也尝到了咬破对方嘴唇时血的气息。
瓦伦缇娜的舌头也进到了她嘴里，宽松的睡袍被一双手从肩头拨落，垂至腰间系带处，那双手又不怀好意地搓揉起她裸露的胸。
时轻时重的挤压，指尖若有若无的拨弄，塞梅尔维斯被挑逗得不自觉挺起了腰。
瓦伦缇娜抬起双腿将她带高，低头咬住变硬了的顶端，膝盖故意顶到了她下身感到火热的位置。
“嗯……啊……”塞梅尔维斯搂住瓦伦缇娜后颈，手指穿过她的发丝轻轻抚摸。瓦伦缇娜的舌尖绕着她乳头舔舐，轻咬后又吸吮，一只手在另一边做着同样的事，酒意来得很快，她不由得闭上了眼，胸口大幅度起伏，接连发出了平时吝于表露的呻吟声。
“哈……瓦伦……缇娜……我、”塞梅尔维斯吞咽了一次，说话已不成句子，“我想……”
瓦伦缇娜没有停下手里和舌头的动作，反而更加重了吸咬和揉捏的力道，直至塞梅尔维斯的喘息声越来越大。
“啊……你别……！”塞梅尔维斯蹭着她的腿想要缓解身下的不适，她有些后悔，明明早知会如此为什么没提前把内裤脱了。
像是终于听懂她的请求，瓦伦缇娜托起她的后臀和腰，把她抱到了那张散发着旧书墨香的桌上推倒，帮她把腿抬上桌后自己也爬了上去，坐在她身上，解开了睡袍最后的维系，如床单一样在桌面铺开。瓦伦缇娜脱掉了自己的连衣长裙，整个人压上了塞梅尔维斯，两根手指伸进了她内裤，在湿润的穴口外来回划过，让液体裹满手指。
“瓦……瓦伦……哈……啊、啊……我……你……！”
持续的外部刺激并不能让塞梅尔维斯满足，反而急得扭起来。
瓦伦缇娜吻住她嘴唇的同时将手指推入，最后的那句呻吟被堵在了嘴里。她舔着塞梅尔维斯的尖牙，逗弄她的舌头，手腕缓缓用力让双指在她体内进出。
栗色大实木书桌在她们交缠的身体运动下只是发出轻微的吱呀回应，几本书被推开。空旷的房间把一次次的碰撞声放大，仿佛整座宅邸都能听见这个回响。两名吸血鬼在哥特式的城堡里交合，飞溅的血液洒落在书上、滴落到桌上、染红了睡袍，只有凌乱的桌面记下了这个夜晚。
塞梅尔维斯蜷起的腿夹住瓦伦缇娜，伸手握住她的手腕，颤抖地摸到她的手背，想要一起施力让她进到更深处。瓦伦缇娜顺着她的节奏推进，自己的呼息却渐渐紊乱。
“哈……！”塞梅尔维斯仰起头大口喘气，她快撑不住了，扶着的手垂到桌上，想拼命抓起什么，只抓住了睡袍系带。
瓦伦缇娜速度加快，嘴贴在她脖子上没有咬下，她要塞梅尔维斯一心感受自己在下方的动作。睡袍在手的抽送和腰的前挺下脱离了桌面，滑落至地毯。塞梅尔维斯抱紧了瓦伦缇娜，没了睡袍，桌上沾满了两人的汗珠。
几次深深推进后，手指感受到一阵收缩的绞痛，瓦伦缇娜的牙也瞬间咬进了塞梅尔维斯脖颈，胡乱吸取她的血液，像是要把消耗的体力全补回来。塞梅尔维斯几乎晕眩，脖子只能感受到酥麻，她搂着恋人慢慢释放高潮后的余韵，因失血而涌起的微妙愉悦让紧贴的心跳逐渐同步。
接下来的一切，塞梅尔维斯都记不太清，只记得火光依旧摇曳，雨声也持续到了天明，她在温暖的绒被里醒来，那个整晚不知疲惫的血食怪还圈着她的腰睡得极香。

窗外雨声潺潺，放在平时，塞梅尔维斯一定早就睡着了。但此时低压的云层就像压在她肩上的未完成工作，即便困意十足，大脑仍为了理清第二日报告如何交付而拒绝入睡。
“你盯着天花板五分钟了，要是不喜欢它的颜色我们可以换一个。”瓦伦缇娜侧过身，撑着头靠在枕边，一缕长发垂在塞梅尔维斯脸上。她竟然无动于衷，今天的恋人不对劲。
塞梅尔维斯翻了个身，背对她，一股有气无力的声音传来：“我只是脑子还没停转，过几小时可能就好了。”
“要不我给你讲个小故事？反正睡不着听一听没什么损失，要是觉得无聊听困了，那也算件好事？”瓦伦缇娜说着，手已经探向了她的腰。怀里的人依旧没有转过来，但向她挪了挪身子，似乎是同意了说故事的提议。瓦伦缇娜放在她腰上手又往自己的方向用了点力，把下巴搁在塞梅尔维斯颈窝上。
“那是在我搬到维也纳之前的事了。”她放轻语调，开始讲述一个遥远的过去。
“十九世纪初的一个春末，我随一位奥地利女伯爵马车旅行，在林茨附近沿着多瑙河岸寻找适合定居的庄园。她有一些人脉，推荐了几处地点，按由北向南的路线逐一带我参观考察。”
“那时候沿岸村镇为了小心应对去年冬天留下的狼患，一入夜就封门闭户，我们想夜间投宿都成了困难。你知道，我白天也不便外出活动，参观都只能定在夜间。”
塞梅尔维斯身子动了动，小声说了句：“女伯爵知道你的身份么？”
瓦伦缇娜噗嗤一笑，手向上拽住她睡衣领口说：“你要不要好好听讲？这不是互动游戏故事，打断故事一次我可就要解一颗了。”话音还没落，最靠上的那颗扣子已经离开了扣眼的束缚。
塞梅尔维斯不再说话，她知道身后的老血食怪说得出做得到，现在的情况比起有些时候没经过犯罪预告就动手的情况还是好上不少。
“……既然在镇里无处可歇，我们便提前前往下一处庄园。那里是战后弃用的地产，在多瑙河支流拐弯的高地上。曾经的宅邸主人是个收藏狂热者，去世前还在休整地下室。”
她的手回到腰间，顺着脊椎滑向塞梅尔维斯肩胛，像不经意地描摹着她的骨骼结构。
“宅邸占地不小，最初可能建立于12世纪，外观是破旧但经典的哥特式风格。白色墙面已经斑驳，杂草也长了半人高。这栋庄园本应是没人的，奇怪的是屋里却有人提前点起了火。女伯爵说是管理员留下的，外面也正下着雨，我便不再多疑。进门时还能看见壁炉边放着刚换的酒杯和毛毯。”
“真贴心。”
这句话瓦伦缇娜不能装没听见，她解开第二颗扣子，手却也被塞梅尔维斯捉住了。
“我那天夜里失眠，坐在书房里翻阅这房子留下的旧文稿。雨声、火光、羊皮纸……加上一丝不知道哪里飘来的玫瑰香，像一种梦幻的组合。不一会儿，女伯爵出现了。”
塞梅尔维斯偏了偏肩膀，甩开了瓦伦缇娜贴近的脸。
“她问我要不要喝一点酒，我说好。她端来一杯琥珀色的甜酒，我接过的时候碰到了她的手，冰冷得像深夜的冻雨。她坐到我身边，眼神就像雨夜远方的风景，什么都看不出来。然后她说——‘我注意你很久了。你身上有种气味……’”
瓦伦缇娜觉得自己的手被塞梅尔维斯狠捏了一下。
“我当时的酒量并不好，那杯酒几口下肚后就有些恍惚。我也不知道怎么就坐到了她腿上——”
“然后她就吻你了。”塞梅尔维斯翻了个身，她已经猜出瓦伦缇娜的故事结局，“然后你就顺势把我——我是说，她把‘你’推倒在书桌上，壁炉烧得噼啪响，雨下个不停，早上起来你们两个衣服都不知道扔哪儿了对不对？”
“是‘我们两个’。”瓦伦缇娜终于憋不住，笑得直用另一只手抹眼泪。
“早在你说酒杯和毛毯的时候我就该怀疑了，也不至于生了半天闷气等你说自己酒量不好才反应过来。你编故事的速度倒是挺快的。”
瓦伦缇娜把她抱进怀里：“都说了是故事，别那么带入嘛，我也是二次加工罢了。这不就为了帮你放松，让你好睡一点？”
“用色诱故事让我放松，你不如直接给我灌镇静剂。”
“可我觉得你身子比刚才放松多了。”瓦伦缇娜低头亲她额角，“你要是真困得睡着了，我就原谅你刚才那句‘推倒在书桌上’。”
“那句有什么问题？”
“你居然不让我描述完坐到腿上的事，我还没说女伯爵的眼睛变化呢，太伤人了。”
“你眼睛什么变化我还能不知道？明明是你瞎编的太快出现破绽。”
“我可以继续慢慢编——”瓦伦缇娜不知何时已经把塞梅尔维斯的扣子全解开，手也放在了她早就想放的地方，“比如，下一部分是‘第二天女伯爵抚摸着你的秀发，问你昨晚舒——”
“……闭嘴。”
这句斥责已经含混不清，塞梅尔维斯睫毛静静垂下，鼻息绵长，像终于卸下了数日奔波后紧绷的防备。
关于那个雨夜的哥特宅邸，那是另一个故事了。

瓦伦缇娜的舌头也进到了她嘴里，宽松的睡袍被一双手从肩头拨落，垂至腰间系带处，那双手又不怀好意地搓揉起她裸露的胸。
时轻时重的挤压，指尖若有若无的拨弄，塞梅尔维斯被挑逗得不自觉挺起了腰。
瓦伦缇娜抬起双腿将她带高，低头咬住变硬了的顶端，膝盖故意顶到了她下身感到火热的位置。
“嗯……啊……”塞梅尔维斯搂住瓦伦缇娜后颈，手指穿过她的发丝轻轻抚摸。瓦伦缇娜的舌尖绕着她乳头舔舐，轻咬后又吸吮，一只手在另一边做着同样的事，酒意来得很快，她不由得闭上了眼，胸口大幅度起伏，接连发出了平时吝于表露的呻吟声。
“哈……瓦伦……缇娜……我、”塞梅尔维斯吞咽了一次，说话已不成句子，“我想……”
瓦伦缇娜没有停下手里和舌头的动作，反而更加重了吸咬和揉捏的力道，直至塞梅尔维斯的喘息声越来越大。
“啊……你别……！”塞梅尔维斯蹭着她的腿想要缓解身下的不适，她有些后悔，明明早知会如此为什么没提前把内裤脱了。
像是终于听懂她的请求，瓦伦缇娜托起她的后臀和腰，把她抱到了那张散发着旧书墨香的桌上推倒，帮她把腿抬上桌后自己也爬了上去，坐在她身上，解开了睡袍最后的维系，如床单一样在桌面铺开。瓦伦缇娜脱掉了自己的连衣长裙，整个人压上了塞梅尔维斯，两根手指伸进了她内裤，在湿润的穴口外来回划过，让液体裹满手指。
“瓦……瓦伦……哈……啊、啊……我……你……！”
持续的外部刺激并不能让塞梅尔维斯满足，反而急得扭起来。
瓦伦缇娜吻住她嘴唇的同时将手指推入，最后的那句呻吟被堵在了嘴里。她舔着塞梅尔维斯的尖牙，逗弄她的舌头，手腕缓缓用力让双指在她体内进出。
栗色大实木书桌在她们交缠的身体运动下只是发出轻微的吱呀回应，几本书被推开。空旷的房间把一次次的碰撞声放大，仿佛整座宅邸都能听见这个回响。两名吸血鬼在哥特式的城堡里交合，飞溅的血液洒落在书上、滴落到桌上、染红了睡袍，只有凌乱的桌面记下了这个夜晚。
塞梅尔维斯蜷起的腿夹住瓦伦缇娜，伸手握住她的手腕，颤抖地摸到她的手背，想要一起施力让她进到更深处。瓦伦缇娜顺着她的节奏推进，自己的呼息却渐渐紊乱。
“哈……！”塞梅尔维斯仰起头大口喘气，她快撑不住了，扶着的手垂到桌上，想拼命抓起什么，只抓住了睡袍系带。
瓦伦缇娜速度加快，嘴贴在她脖子上没有咬下，她要塞梅尔维斯一心感受自己在下方的动作。睡袍在手的抽送和腰的前挺下脱离了桌面，滑落至地毯。塞梅尔维斯抱紧了瓦伦缇娜，没了睡袍，桌上沾满了两人的汗珠。
几次深深推进后，手指感受到一阵收缩的绞痛，瓦伦缇娜的牙也瞬间咬进了塞梅尔维斯脖颈，胡乱吸取她的血液，像是要把消耗的体力全补回来。塞梅尔维斯几乎晕眩，脖子只能感受到酥麻，她搂着恋人慢慢释放高潮后的余韵，因失血而涌起的微妙愉悦让紧贴的心跳逐渐同步。
接下来的一切，塞梅尔维斯都记不太清，只记得火光依旧摇曳，雨声也持续到了天明，她在温暖的绒被里醒来，那个整晚不知疲惫的血食怪还圈着她的腰睡得极香。
